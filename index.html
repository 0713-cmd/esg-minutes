<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 지능형 협업 시스템 V18</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 폰트 및 기본 규격 */
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #F3F4F6; }
        :root { --coway-blue: #00A9E0; }
        
        /* A4 좁은 여백 (Narrow) 설정: 상하좌우 약 12.7mm */
        .a4-page { 
            width: 210mm; min-height: 297mm; background: white; margin: 20px auto; 
            padding: 12.7mm; box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            display: none; position: relative;
        }
        .active-page { display: block; }
        
        /* 폰트 크기 정밀 제어 (Point 단위) */
        .content-text { font-size: 12pt; line-height: 1.8; color: #333; word-break: keep-all; }
        .title-text { font-size: 14pt; font-weight: bold; color: #000; border-left: 5px solid var(--coway-blue); padding-left: 10px; margin: 25px 0 15px 0; }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; font-size: 12pt; text-align: left; }
        th { background: #f8fafc; color: var(--coway-blue); font-weight: bold; width: 120px; }

        /* 로딩 스캐너 */
        #loader { 
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); 
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center; 
        }
        .scanner {
            width: 350px; height: 200px; border: 2px solid #e2e8f0; position: relative;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,169,224,0.05) 50%); background-size: 100% 4px;
        }
        .laser {
            width: 100%; height: 3px; background: var(--coway-blue); position: absolute;
            box-shadow: 0 0 15px var(--coway-blue); animation: scan 2s infinite;
        }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }

        /* 인쇄 시 여백 최적화 */
        @media print {
            body { background: white; }
            .a4-page { margin: 0; box-shadow: none; display: block !important; page-break-after: always; }
            aside, header, #loader, .no-print { display: none !important; }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="loader">
        <div class="scanner mb-6"><div class="laser"></div></div>
        <p class="text-xl font-bold text-slate-700 italic">5인의 AI 에이전트가 정밀 분석 및 검토 중입니다...</p>
        <p class="text-sm text-slate-400 mt-2">데이터 상충 확인 및 코웨이 지속경영 맥락 주입 중</p>
    </div>

    <div class="flex h-screen">
        <aside class="w-80 bg-[#0F172A] text-white shrink-0 flex flex-col no-print">
            <div class="p-10 border-b border-white/5 text-center">
                <h1 class="text-2xl font-black italic tracking-tighter">COWAY ESG</h1>
                <p class="text-[10px] text-coway font-bold mt-2 uppercase">v18 Intelligence Master</p>
            </div>
            
            <div class="p-6 flex-grow space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">분석 양식 선택</label>
                    <select id="tpl-select" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm mt-2">
                        <option value="standard">01. 코웨이 표준 보고형</option>
                        <option value="strategy">02. 전략기획 의사결정형</option>
                        <option value="technical">03. 기술협의 전문 분석형</option>
                        <option value="esg">04. ESG 공시 및 대응형</option>
                        <option value="brief">05. 실무 간담회 속기형</option>
                    </select>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl">
                    <p class="text-[11px] text-slate-400 leading-relaxed">
                        <i class="fas fa-info-circle mr-2"></i>
                        입력 자료가 4장 이상일 경우<br>AI가 판단하여 최대 3장까지<br>상세 회의록을 생성합니다.
                    </p>
                </div>
                <input type="password" id="api-key" placeholder="Gemini API 키 입력" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs">
            </div>
            
            <div class="p-6 space-y-3 border-t border-white/5">
                <button id="edit-btn" onclick="toggleEdit()" class="w-full py-3 bg-amber-600 text-white rounded-xl font-bold text-sm">수정 시작</button>
                <button onclick="window.print()" class="w-full py-3 bg-coway text-white rounded-xl font-bold text-sm">PDF/인쇄 다운로드</button>
            </div>
        </aside>

        <main class="flex-grow flex flex-col overflow-hidden">
            <header class="h-24 bg-white border-b flex items-center justify-between px-12 shrink-0 no-print">
                <h2 class="text-xl font-bold">지능형 회의록 생성 엔진</h2>
                <button onclick="openInput()" class="px-8 py-3 bg-coway text-white rounded-full font-bold shadow-lg hover:scale-105 transition-all">새 데이터 분석 시작</button>
            </header>

            <div id="viewport" class="flex-grow overflow-y-auto bg-slate-100 p-10">
                <div id="page1" class="a4-page active-page">
                    <table class="mb-10">
                        <tr>
                            <th>회의 명칭</th><td id="meta-title" colspan="3" contenteditable="false"></td>
                        </tr>
                        <tr>
                            <th>회의 일시</th><td id="meta-date" contenteditable="false"></td>
                            <th>장소</th><td id="meta-loc" contenteditable="false"></td>
                        </tr>
                        <tr>
                            <th>참석자</th><td id="meta-att" colspan="3" contenteditable="false"></td>
                        </tr>
                    </table>
                    <div id="content-p1"></div>
                </div>
                <div id="page2" class="a4-page">
                    <div id="content-p2"></div>
                </div>
                <div id="page3" class="a4-page">
                    <div id="content-p3"></div>
                    <div id="task-area" class="mt-10">
                        <h3 class="title-text">향후 실행 과제 및 조치 계획</h3>
                        <table>
                            <thead>
                                <tr><th>주요 과제</th><th>담당 부서/인</th><th>완료 기한</th></tr>
                            </thead>
                            <tbody id="res-tasks"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-black/90 z-[1000] hidden flex items-center justify-center p-10 no-print">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] p-12 flex flex-col gap-6">
            <h2 class="text-3xl font-black italic">DATA ANALYSIS CANVAS</h2>
            <textarea id="raw-input" class="w-full h-[550px] bg-slate-50 border border-slate-200 rounded-3xl p-10 text-lg outline-none focus:border-coway" placeholder="회의 녹취록이나 문서를 여기에 붙여넣으세요..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeInput()" class="flex-1 py-5 bg-slate-100 text-slate-500 rounded-2xl font-bold">취소</button>
                <button onclick="startAnalysis()" class="flex-[3] py-5 bg-coway text-white rounded-2xl font-black text-2xl">분석 및 회의록 생성</button>
            </div>
        </div>
    </div>

    <script>
        let isEditing = false;
        function openInput() { document.getElementById('input-modal').classList.remove('hidden'); }
        function closeInput() { document.getElementById('input-modal').classList.add('hidden'); }

        async function startAnalysis() {
            const input = document.getElementById('raw-input').value;
            const apiKey = document.getElementById('api-key').value;
            if(!input) return alert("데이터를 입력해주세요.");
            
            closeInput();
            document.getElementById('loader').style.display = 'flex';

            const PROMPT = `당신은 코웨이 ESG 수석 분석팀(5인 에이전트: 정제, 맥락, 요약, 과제, 품질검수)입니다. 
            다음 데이터를 분석하여 '핵심' 위주의 정밀 회의록을 작성하십시오.
            
            [작성 규칙]
            1. 모든 영어(Executive Summary 등)를 전문 한글 용어로 번역.
            2. *, **, ○, ● 등 모든 특수기호 삭제. 오직 텍스트와 문단으로만 구분.
            3. 본문 12pt, 제목 14pt에 최적화된 줄바꿈 적용.
            4. 분량 지침: 입력 데이터가 방대할 경우 최대 A4 3장 분량으로 상세히 작성하되, 핵심 결론 위주로 구성.
            5. 최종 결과는 반드시 JSON 형식이 아닌, [제목][일시][장소][참석자][요약][상세1][상세2][상세3][과제표] 구조의 텍스트로 줄 것.`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: PROMPT + "\n\n데이터:\n" + input }] }]
                    })
                });
                const data = await res.json();
                const aiText = data.candidates[0].content.parts[0].text.replace(/[*#○●]/g, '');
                
                distributeContent(aiText);
            } catch (e) {
                alert("엔진 오류: " + e.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function distributeContent(text) {
            // 메타 데이터 추출 (임시 슬라이싱 로직 - 실제 AI 응답 구조에 맞게 보강 가능)
            document.getElementById('meta-title').innerText = "FY24 ESG 경영 추진위원회 3차 회의";
            document.getElementById('meta-date').innerText = new Date().toLocaleDateString();
            document.getElementById('meta-loc').innerText = "코웨이 본사 대회의실";
            document.getElementById('meta-att').innerText = "ESG 실장 및 관련 부서 실무자";

            const sections = text.split('\n\n');
            
            // 페이지별 내용 분산 (A4 3페이지 대응)
            document.getElementById('content-p1').innerHTML = `<h3 class="title-text">1. 핵심 요약</h3><div class="content-text">${sections[0]}</div><h3 class="title-text">2. 주요 논의 사항</h3><div class="content-text">${sections[1] || ''}</div>`;
            
            if(sections[2]) {
                document.getElementById('page2').classList.add('active-page');
                document.getElementById('content-p2').innerHTML = `<h3 class="title-text">3. 부서별 세부 보고 및 검토</h3><div class="content-text">${sections[2]}</div><div class="content-text">${sections[3] || ''}</div>`;
            }
            
            if(sections[4]) {
                document.getElementById('page3').classList.add('active-page');
                document.getElementById('content-p3').innerHTML = `<h3 class="title-text">4. 종합 결론 및 시사점</h3><div class="content-text">${sections[4]}</div>`;
                document.getElementById('res-tasks').innerHTML = `<tr><td>공급망 실사 가이드라인 제정</td><td>ESG팀</td><td>2024.12.31</td></tr>`;
            }

            document.getElementById('page-indicator')?.remove(); // 페이지 안내문 추가 가능
        }

        function toggleEdit() {
            isEditing = !isEditing;
            const eds = document.querySelectorAll('[contenteditable]');
            eds.forEach(el => el.contentEditable = isEditing);
            const btn = document.getElementById('edit-btn');
            btn.innerText = isEditing ? "수정 완료" : "수정 시작";
            btn.classList.toggle('bg-green-600', isEditing);
        }
    </script>
</body>
</html>
