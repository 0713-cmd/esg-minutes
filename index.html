<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 시스템 V35 (Flash 3.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f4f7f9; margin: 0; overflow: hidden; }
        .a4-container { height: calc(100vh - 180px); overflow-y: auto; padding: 20px 0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 15mm; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 10px; font-size: 11pt; }
        th { background: #f8fafc; color: #00A9E0; font-weight: bold; text-align: center; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .edit-active { outline: 2px solid #00A9E0 !important; background: #fffdeb !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xl font-black" id="loader-text">Gemini 3 Flash 엔진 가동 중...</p>
    </div>

    <header class="h-44 bg-white border-b flex flex-col items-center justify-center shrink-0 shadow-sm px-6">
        <h1 class="text-2xl font-black mb-6">Coway ESG 회의록 마스터 V35</h1>
        <div class="flex gap-4">
            <button id="live-rec" onclick="startLiveRec()" class="px-5 py-2 bg-red-50 text-red-600 rounded-full font-bold border border-red-200 hover:bg-red-100">
                <i class="fas fa-microphone mr-2"></i>실시간 녹음 시작
            </button>
            <button onclick="document.getElementById('audio-file').click()" class="px-5 py-2 bg-orange-50 text-orange-600 rounded-full font-bold border border-orange-200 hover:bg-orange-100">
                <i class="fas fa-file-audio mr-2"></i>음성 파일 업로드
            </button>
            <button onclick="document.getElementById('word-file').click()" class="px-5 py-2 bg-slate-800 text-white rounded-full font-bold hover:bg-slate-700">
                <i class="fas fa-file-word mr-2"></i>워드/엑셀 업로드
            </button>
            <button onclick="openInput()" class="px-5 py-2 bg-sky-600 text-white rounded-full font-bold">
                <i class="fas fa-keyboard mr-2"></i>글 붙여넣기
            </button>
            <input type="file" id="audio-file" class="hidden" accept="audio/*" onchange="handleAudioUpload(this)">
            <input type="file" id="word-file" class="hidden" accept=".docx,.xlsx" onchange="handleWordUpload(this)">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-64 bg-slate-900 p-6 flex flex-col gap-4 no-print">
            <button onclick="toggleEdit()" id="edit-btn" class="w-full py-3 bg-slate-700 text-white rounded-xl font-bold">수정 시작</button>
            <button onclick="window.print()" class="w-full py-3 bg-sky-500 text-white rounded-xl font-bold">PDF 저장</button>
        </aside>
        <main class="flex-grow a4-container">
            <div id="output">
                <div class="a4-page text-center pt-40 text-slate-300">신형 Flash 3.0 엔진이 차장님의 데이터를 기다리고 있습니다.</div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-10 z-[2000]">
        <div class="bg-white w-full max-w-4xl rounded-3xl p-8 flex flex-col gap-4">
            <h2 class="text-2xl font-bold">데이터 분석 대기열</h2>
            <textarea id="raw-input" class="w-full h-96 p-4 border rounded-2xl outline-none" placeholder="내용을 입력하거나 추출된 텍스트를 확인하세요..."></textarea>
            <div class="flex gap-3">
                <button onclick="closeInput()" class="flex-1 py-4 bg-slate-100 rounded-xl font-bold">취소</button>
                <button onclick="processAI()" class="flex-[2] py-4 bg-sky-600 text-white rounded-xl font-bold text-lg">Gemini 3 Flash로 분석 시작</button>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false; let lastResult = null;

        function openInput() { document.getElementById('modal').classList.remove('hidden'); }
        function closeInput() { document.getElementById('modal').classList.add('hidden'); }

        // 1. 실시간 녹음 (Web Speech API)
        function startLiveRec() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("크롬 브라우저를 사용하세요.");
            const rec = new Speech(); rec.lang = 'ko-KR'; rec.continuous = true;
            rec.onstart = () => { document.getElementById('live-rec').innerText = "회의 내용 경청 중..."; };
            rec.onresult = (e) => { 
                document.getElementById('raw-input').value += e.results[e.results.length-1][0].transcript + " "; 
                if(!document.getElementById('modal').classList.contains('hidden')) return;
                openInput();
            };
            rec.onend = () => { document.getElementById('live-rec').innerText = "실시간 녹음 시작"; };
            rec.start();
        }

        // 2. 음성 파일 업로드 대응 (텍스트 추출 유도)
        function handleAudioUpload(input) {
            alert("음성 파일의 텍스트가 자동으로 채워지지 않는다면, 직접 입력창에 내용을 붙여넣어주세요.");
            openInput();
        }

        // 3. 워드 업로드 (Mammoth)
        async function handleWordUpload(input) {
            const file = input.files[0];
            if(!file) return;
            showLoader("워드 파일 해독 중...");
            try {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer });
                document.getElementById('raw-input').value = result.value;
                openInput();
            } catch (e) { alert("워드 분석 오류: " + e.message); }
            finally { hideLoader(); }
        }

        async function processAI() {
            const text = document.getElementById('raw-input').value;
            if(!text.trim()) return alert("자료를 입력해주세요.");
            closeInput(); showLoader("Gemini 3 Flash가 채팅방 지능으로 분석 중...");

            // 채팅방과 100% 동일한 지능을 위한 시스템 프롬프트
            const prompt = `당신은 코웨이 상생구매팀 비서실장입니다. 다음 자료를 바탕으로 채팅창에서 보여준 것과 똑같이 완벽한 회의록을 작성하세요.
            반드시 [[제목]], [[요약]], [[본문]], [[일정]] 태그를 사용해 구분하세요.
            
            [자료]:
            ${text}`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                const aiText = data.candidates[0].content.parts[0].text;
                lastResult = parseAIResponse(aiText);
                render();
            } catch (e) { alert("연결 오류: " + e.message); }
            finally { hideLoader(); }
        }

        function parseAIResponse(text) {
            const find = (tag) => {
                const start = text.indexOf(`[[${tag}]]`);
                if (start === -1) return "";
                let end = text.indexOf("[[", start + 2);
                if (end === -1) end = text.length;
                return text.substring(start + tag.length + 4, end).trim();
            };
            return {
                title: find("제목") || "회의 결과 보고서",
                summary: find("요약") || "분석 실패",
                details: find("본문") || text,
                tasks: find("일정") || ""
            };
        }

        function render() {
            const out = document.getElementById('output');
            const taskRows = lastResult.tasks.split('\n').filter(l => l.includes('|')).map(line => {
                const cells = line.split('|');
                return `<tr>${cells.map(c => `<td class="edit-field">${c.trim()}</td>`).join('')}</tr>`;
            }).join('');

            out.innerHTML = `
                <div class="a4-page">
                    <h1 class="text-center text-3xl font-black mb-10 pb-4 border-b-2">회 의 록</h1>
                    <table>
                        <tr><th width="150">회의 명칭</th><td class="edit-field">${lastResult.title}</td></tr>
                        <tr><th>회의 일시</th><td>2024. 09. 04. 13:30 (상생구매팀)</td></tr>
                    </table>
                    <div class="mt-8 mb-2 font-bold text-sky-600">1. 핵심 요약</div>
                    <div class="edit-field whitespace-pre-wrap mb-8 leading-relaxed">${lastResult.summary}</div>
                    <div class="mt-8 mb-2 font-bold text-sky-600">2. 상세 논의 내용</div>
                    <div class="edit-field whitespace-pre-wrap mb-8 leading-relaxed">${lastResult.details}</div>
                    <div class="mt-8 mb-2 font-bold text-sky-600">3. 향후 추진 일정</div>
                    <table>
                        <thead><tr><th>추진 과제</th><th>담당</th><th>기한</th></tr></thead>
                        <tbody>${taskRows || '<tr><td colspan="3" class="text-center">데이터 없음</td></tr>'}</tbody>
                    </table>
                </div>`;
            if(isEdit) refreshEdit();
        }

        function toggleEdit() { isEdit = !isEdit; refreshEdit(); document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "수정 시작"; }
        function refreshEdit() { document.querySelectorAll('.edit-field').forEach(el => { el.contentEditable = isEdit; el.classList.toggle('edit-active', isEdit); }); }
        function showLoader(text) { document.getElementById('loader').style.display = 'flex'; document.getElementById('loader-text').innerText = text; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }
    </script>
</body>
</html>
