<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록 자동생성 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --navy-mid: #1a3260;
    --navy-light: #243d73;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f8f5ef;
    --white: #ffffff;
    --gray-100: #f4f4f6;
    --gray-200: #e8e8ec;
    --gray-300: #d1d1d6;
    --gray-400: #a1a1aa;
    --text: #1a1a2e;
    --text-light: #636366;
    --shadow: 0 4px 24px rgba(15, 31, 61, 0.12);
    --shadow-strong: 0 8px 32px rgba(15, 31, 61, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; min-height: 100vh; }

  /* UI/디자인은 차장님 원본 100% 그대로 유지 */
  header { background: var(--navy); padding: 18px 32px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 10px rgba(201,168,76,0.3); }
  .logo-text { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--gold-light); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; opacity: 0.9; }

  main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }
  .card { background: var(--white); border-radius: 20px; padding: 32px; margin-bottom: 28px; box-shadow: var(--shadow); border: 1px solid rgba(201,168,76,0.1); position: relative; overflow: hidden; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 16px; margin-bottom: 0; }
  .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 8px; margin-left: 4px; }
  input, select, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: 12px; font-size: 15px; font-family: inherit; transition: all 0.2s ease; background: var(--gray-100); }
  input:focus, textarea:focus { outline: none; border-color: var(--gold); background: var(--white); box-shadow: 0 0 0 4px rgba(201,168,76,0.1); }

  .tab-bar { display: flex; gap: 6px; margin-bottom: 28px; background: var(--gray-100); padding: 5px; border-radius: 14px; border: 1px solid var(--gray-200); }
  .tab-btn { flex: 1; padding: 11px 20px; border: none; background: transparent; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text-light); cursor: pointer; transition: all 0.2s ease; }
  .tab-btn.active { background: var(--navy); color: var(--white); box-shadow: 0 4px 12px rgba(15, 31, 61, 0.2); }

  .upload-area { border: 2px dashed var(--gray-200); border-radius: 16px; padding: 48px 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; background: var(--gray-100); }
  .upload-area:hover { border-color: var(--gold); background: var(--white); }
  .btn-generate { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); color: var(--white); padding: 18px 56px; border-radius: 50px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(15, 31, 61, 0.2); margin-top: 12px; }
  .result-card { display: none; background: var(--white); border-radius: 20px; padding: 48px; box-shadow: var(--shadow-strong); border: 1px solid var(--gray-200); margin-top: 32px; animation: slideUp 0.5s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-icon">📋</div><div><div class="logo-text">회의록 자동생성 시스템</div><div class="logo-sub">AI Meeting Minutes Generator</div></div></div>
  </div>
</header>

<main>
  <div class="card">
    <div class="info-grid">
      <div class="input-group"><label>회의 일자</label><input type="date" id="meetingDate"></div>
      <div class="input-group"><label>회의 시간</label><input type="time" id="meetingTime"></div>
      <div class="input-group"><label>회의 제목</label><input type="text" id="meetingTitle" placeholder="회의 제목을 입력하세요"></div>
    </div>
    <div class="input-group" style="margin-top: 16px;"><label>참석자</label><input type="text" id="meetingAttendees" placeholder="참석자 명단을 입력하세요 (예: 홍길동 차장, 김철수 과장)"></div>
  </div>

  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('docs', this)">📄 문서 파일 업로드</button>
      <button class="tab-btn" onclick="switchTab('paste', this)">✏️ 직접 텍스트 입력</button>
    </div>
    <div id="tab-docs"><div class="upload-area" onclick="document.getElementById('docsFile').click()">📂 클릭하여 회의 자료 업로드 (.docx, .xlsx, .txt)<input type="file" id="docsFile" multiple hidden onchange="handleDocsFile(this)"><div id="docsBadge" style="margin-top:12px;"></div></div></div>
    <div id="tab-paste" style="display:none;"><textarea id="pasteText" style="height:250px;" placeholder="회의 내용을 자유롭게 입력하거나 붙여넣으세요..."></textarea></div>
  </div>

  <button class="btn-generate" onclick="generateMinutes()">✨ AI 회의록 생성</button>

  <div class="result-card" id="resultCard">
    <div id="resultContent"></div>
    <div style="margin-top:40px; display:flex; gap:12px; justify-content:center;">
      <button onclick="exportWord()" style="background:var(--navy); color:white; padding:12px 28px; border-radius:30px; border:none; cursor:pointer; font-weight:600;">📝 Word로 저장</button>
      <button onclick="window.print()" style="background:var(--gray-200); color:var(--navy); padding:12px 28px; border-radius:30px; border:none; cursor:pointer; font-weight:600;">📥 PDF로 출력</button>
    </div>
  </div>
</main>

<script>
// [JS] 원본 로직 100% 보존. Vercel 연결을 위해 fetch 경로만 딱 한 줄 수정.
let state = { extractedText: '' };

async function handleDocsFile(input) {
  const files = input.files;
  let combined = '';
  for (const file of files) {
    if (file.name.endsWith('.docx')) {
      const buffer = await file.arrayBuffer();
      const res = await mammoth.extractRawText({ arrayBuffer: buffer });
      combined += `\n[문서: ${file.name}]\n${res.value}\n`;
    } else if (file.name.endsWith('.xlsx')) {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type: 'array' });
      wb.SheetNames.forEach(n => {
        combined += `\n[시트: ${n}]\n${XLSX.utils.sheet_to_csv(wb.Sheets[n])}\n`;
      });
    }
  }
  state.extractedText = combined;
  document.getElementById('docsBadge').innerHTML = `<span style="color:var(--navy); font-weight:600;">✅ ${files.length}개의 파일 분석 완료</span>`;
}

function switchTab(tab, btn) {
  document.getElementById('tab-docs').style.display = tab === 'docs' ? 'block' : 'none';
  document.getElementById('tab-paste').style.display = tab === 'paste' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function generateMinutes() {
  const text = state.extractedText || document.getElementById('pasteText').value;
  if (!text) return alert("분석할 데이터를 입력해주세요.");
  
  document.querySelector('.btn-generate').innerText = "⏳ AI가 회의록을 작성 중입니다...";

  try {
    // ── 차장님 지시대로 /api/analyze 서버리스 함수와 연결 ──
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `
# ROLE: 전문 회의록 작성 전문가
# TASK: 아래 제공된 회의 자료 및 내용을 바탕으로 정갈하고 전문적인 회의록을 작성하라.
# FORMAT: 반드시 HTML 태그(h2, table, tr, th, td, ul, li)를 사용하여 구조화하라.

[회의 정보]
제목: ${document.getElementById('meetingTitle').value}
참석자: ${document.getElementById('meetingAttendees').value}

[데이터 데이터]
${text}
        ` }] }]
      })
    });

    const data = await response.json();
    const result = data.candidates[0].content.parts[0].text;
    document.getElementById('resultContent').innerHTML = result;
    document.getElementById('resultCard').style.display = 'block';
  } catch (e) {
    alert("오류가 발생했습니다. Vercel 환경 변수 설정을 확인하세요.");
  } finally {
    document.querySelector('.btn-generate').innerText = "✨ AI 회의록 생성";
  }
}

function exportWord() {
  const content = document.getElementById('resultContent').innerHTML;
  const blob = new Blob(['<html><body>' + content + '</body></html>'], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Meeting_Minutes.doc';
  a.click();
}
</script>
</body>
</html>
