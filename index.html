<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 회의록 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f4f8; margin: 0; overflow: hidden; }
        .a4-container { height: calc(100vh - 160px); overflow-y: auto; padding: 30px 0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 20mm; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .title-text { font-size: 14pt; font-weight: bold; border-left: 6px solid #00A9E0; padding-left: 12px; margin: 30px 0 15px 0; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        /* 마크다운 스타일링: 채팅방 느낌 100% 재현 */
        .markdown-content h1, .markdown-content h2 { font-weight: bold; font-size: 1.25rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1a1a1a; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin-top: 1rem; border: 1px solid #000; }
        .markdown-content th, .markdown-content td { border: 1px solid #000; padding: 10px; font-size: 11pt; text-align: left; }
        .markdown-content th { background: #f8fafc; color: #00A9E0; text-align: center; }
        .edit-active { outline: 2px solid #00A9E0 !important; background: #fffdeb !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xl font-bold text-slate-700">회의록을 생성하고 있습니다...</p>
    </div>

    <header class="h-40 bg-white border-b flex flex-col items-center justify-center shrink-0 px-10 no-print shadow-sm">
        <h1 class="text-2xl font-black text-slate-900 mb-6 tracking-tight">Coway ESG 회의록 생성 시스템</h1>
        <div class="flex gap-3">
            <button id="mic-btn" onclick="toggleMic()" class="px-6 py-2.5 bg-red-50 text-red-600 rounded-full font-bold border border-red-200 hover:bg-red-100 transition-all">
                <i class="fas fa-microphone mr-2"></i>실시간 녹음
            </button>
            <button onclick="downloadDoc()" class="px-6 py-2.5 bg-green-50 text-green-700 rounded-full font-bold border border-green-200 hover:bg-green-100">
                <i class="fas fa-download mr-2"></i>텍스트 저장
            </button>
            <button onclick="document.getElementById('file-in').click()" class="px-6 py-2.5 bg-slate-800 text-white rounded-full font-bold">
                <i class="fas fa-file-word mr-2"></i>파일 업로드
            </button>
            <button onclick="openInput()" class="px-6 py-2.5 bg-sky-600 text-white rounded-full font-bold">텍스트 직접 입력</button>
            <input type="file" id="file-in" class="hidden" accept=".docx" onchange="handleFile(this)">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-64 bg-slate-900 p-6 flex flex-col gap-4 no-print shadow-2xl">
            <button onclick="toggleEdit()" id="edit-btn" class="w-full py-4 bg-slate-700 text-white rounded-2xl font-bold">내용 수정</button>
            <button onclick="window.print()" class="w-full py-4 bg-[#00A9E0] text-white rounded-2xl font-black">PDF 출력 / 저장</button>
        </aside>
        <main class="flex-grow a4-container">
            <div id="output-area">
                <div class="a4-page text-center pt-40 text-slate-300 font-bold">
                    상단 버튼을 이용하여 회의 자료를 입력해 주세요.
                </div>
            </div>
        </main>
    </div>

    <div id="modal-input" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-10 z-[2000]">
        <div class="bg-white w-full max-w-5xl rounded-3xl p-10 flex flex-col gap-6 shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800">자료 입력 및 확인</h2>
            <textarea id="raw-text" class="w-full h-[50vh] p-6 border-2 border-slate-100 rounded-2xl outline-none focus:border-sky-500 text-lg" placeholder="내용을 입력하거나 녹음된 텍스트를 확인하세요..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeInput()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-xl font-bold">취소</button>
                <button onclick="runAnalysis()" class="flex-[3] py-4 bg-sky-600 text-white rounded-xl font-black text-xl shadow-lg">회의록 생성 시작</button>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false; let recognition; let isRec = false;

        function openInput() { document.getElementById('modal-input').classList.remove('hidden'); }
        function closeInput() { document.getElementById('modal-input').classList.add('hidden'); }

        // [핵심] 실시간 녹음 기능 (먹통 방지 로직 적용)
        function toggleMic() {
            const Speech = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Speech) return alert("크롬 브라우저가 필요합니다.");
            
            if(!isRec) {
                recognition = new Speech();
                recognition.lang = 'ko-KR';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.onstart = () => {
                    isRec = true;
                    document.getElementById('mic-btn').innerText = "녹음 중지";
                    document.getElementById('mic-btn').classList.replace('bg-red-50', 'bg-red-600');
                    document.getElementById('mic-btn').classList.replace('text-red-600', 'text-white');
                };
                recognition.onresult = (e) => {
                    let transcript = '';
                    for (let i = e.resultIndex; i < e.results.length; i++) {
                        if (e.results[i].isFinal) transcript += e.results[i][0].transcript;
                    }
                    if(transcript) document.getElementById('raw-text').value += transcript + " ";
                };
                recognition.start();
            } else {
                recognition.stop();
                isRec = false;
                document.getElementById('mic-btn').innerText = "실시간 녹음";
                document.getElementById('mic-btn').classList.replace('bg-red-600', 'bg-red-50');
                document.getElementById('mic-btn').classList.replace('text-white', 'text-red-600');
                openInput();
            }
        }

        function downloadDoc() {
            const content = document.getElementById('raw-text').value;
            if(!content) return alert("저장할 내용이 없습니다.");
            const blob = new Blob([content], { type: 'application/msword' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "회의녹음본.doc";
            a.click();
        }

        async function handleFile(input) {
            const file = input.files[0];
            if(!file) return;
            const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
            document.getElementById('raw-text').value = res.value;
            openInput();
        }

        async function runAnalysis() {
            const text = document.getElementById('raw-text').value;
            if(!text.trim()) return;
            closeInput(); document.getElementById('loader').style.display = 'flex';

            const prompt = `당신은 코웨이 비서실장입니다. 다음 자료를 바탕으로 고품격 회의록을 작성하세요.
            반드시 요약, 상세 논의 내용, 추진 일정(표)을 포함해야 하며, 볼드체와 글머리 기호(-), 표(|)를 사용하여 아주 정갈하게 출력하십시오.
            [자료]:\n${text}`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                
                // 마크다운 렌더링
                const html = marked.parse(aiMsg);
                document.getElementById('output-area').innerHTML = `
                    <div class="a4-page">
                        <h1 class="text-center text-3xl font-black mb-12 pb-4 border-b-2">회 의 록</h1>
                        <div class="edit-field markdown-content text-justify">${html}</div>
                    </div>`;
            } catch (e) { alert("분석에 실패했습니다."); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function toggleEdit() {
            isEdit = !isEdit;
            document.querySelectorAll('.edit-field').forEach(el => {
                el.contentEditable = isEdit;
                el.classList.toggle('edit-active', isEdit);
            });
            document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "내용 수정";
        }
    </script>
</body>
</html>
