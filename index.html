<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 회의록 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f4f7f9; margin: 0; overflow: hidden; }
        .a4-container { height: calc(100vh - 160px); overflow-y: auto; padding: 30px 0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 20mm; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 마크다운 렌더링 최적화: 표 깨짐 방지 */
        .markdown-body { font-size: 11pt; line-height: 1.8; color: #1a1a1a; }
        .markdown-body h2 { font-size: 14pt; font-weight: bold; border-left: 6px solid #00A9E0; padding-left: 10px; margin: 30px 0 15px 0; border-bottom: none; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: auto; }
        .markdown-body th, .markdown-body td { border: 1px solid #000; padding: 10px; word-break: keep-all; }
        .markdown-body th { background: #f8fafc; color: #00A9E0; font-weight: bold; }
        .edit-active { outline: 2px solid #00A9E0 !important; background: #fffdeb !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xl font-bold">제미나이가 회의록을 집필 중입니다...</p>
    </div>

    <header class="h-40 bg-white border-b flex flex-col items-center justify-center shrink-0 px-10 no-print">
        <h1 class="text-2xl font-black text-slate-800 mb-6">Coway ESG 회의록 시스템</h1>
        <div class="flex gap-3">
            <button id="mic-btn" onclick="toggleMic()" class="px-6 py-2.5 bg-red-50 text-red-600 rounded-full font-bold border border-red-200">
                <i class="fas fa-microphone mr-2"></i>실시간 녹음
            </button>
            <button onclick="downloadText()" class="px-6 py-2.5 bg-green-50 text-green-700 rounded-full font-bold border border-green-200">
                <i class="fas fa-download mr-2"></i>녹음본 저장
            </button>
            <button onclick="document.getElementById('file-in').click()" class="px-6 py-2.5 bg-slate-800 text-white rounded-full font-bold">
                <i class="fas fa-file-word mr-2"></i>워드 업로드
            </button>
            <button onclick="openInput()" class="px-6 py-2.5 bg-sky-600 text-white rounded-full font-bold">글 직접 입력</button>
            <input type="file" id="file-in" class="hidden" accept=".docx" onchange="handleFile(this)">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-64 bg-slate-900 p-6 flex flex-col gap-4 no-print shadow-xl">
            <button onclick="toggleEdit()" id="edit-btn" class="w-full py-4 bg-slate-700 text-white rounded-2xl font-bold">내용 수정</button>
            <button onclick="window.print()" class="w-full py-4 bg-sky-500 text-white rounded-2xl font-black">PDF 저장</button>
        </aside>
        <main class="flex-grow a4-container">
            <div id="output-area">
                <div class="a4-page text-center pt-40 text-slate-300 font-bold">회의 내용을 입력하면 고품격 회의록이 생성됩니다.</div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/95 hidden flex items-center justify-center p-10 z-[5000]">
        <div class="bg-white w-full max-w-5xl rounded-3xl p-10 flex flex-col gap-6">
            <h2 class="text-2xl font-bold">입력 데이터 확인</h2>
            <textarea id="raw-text" class="w-full h-[50vh] p-6 border rounded-2xl outline-none text-lg" placeholder="내용이 여기에 표시됩니다..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeInput()" class="flex-1 py-4 bg-slate-100 rounded-xl">취소</button>
                <button onclick="process()" class="flex-[3] py-4 bg-sky-600 text-white rounded-xl font-bold text-xl">회의록 생성</button>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false; let rec; let isRec = false;

        function openInput() { document.getElementById('modal').classList.remove('hidden'); }
        function closeInput() { document.getElementById('modal').classList.add('hidden'); }

        // [복구] 실시간 녹음
        function toggleMic() {
            const Speech = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Speech) return alert("크롬을 사용하세요.");
            if(!isRec) {
                rec = new Speech(); rec.lang = 'ko-KR'; rec.continuous = true;
                rec.onstart = () => { isRec = true; document.getElementById('mic-btn').innerText = "녹음 중..."; document.getElementById('mic-btn').className = "px-6 py-2.5 bg-red-600 text-white rounded-full font-bold"; };
                rec.onresult = (e) => { document.getElementById('raw-text').value += e.results[e.results.length-1][0].transcript + " "; };
                rec.start();
            } else {
                rec.stop(); isRec = false;
                document.getElementById('mic-btn').innerText = "실시간 녹음"; document.getElementById('mic-btn').className = "px-6 py-2.5 bg-red-50 text-red-600 rounded-full font-bold border border-red-200";
                openInput();
            }
        }

        function downloadText() {
            const t = document.getElementById('raw-text').value;
            if(!t) return;
            const blob = new Blob([t], {type:'application/msword'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="회의원문.doc"; a.click();
        }

        async function handleFile(i) {
            const file = i.files[0]; if(!file) return;
            const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
            document.getElementById('raw-text').value = res.value; openInput();
        }

        async function process() {
            const text = document.getElementById('raw-text').value;
            if(!text.trim()) return;
            closeInput(); document.getElementById('loader').style.display = 'flex';

            // [95% 핵심] 퓨샷 프롬프트 (정답 예시 제공 및 사족 금지)
            const prompt = `당신은 코웨이 비서실장입니다. 다음 자료를 분석하여 "회의록"만 출력하세요. 
            인사말, 설명, 사족은 절대 쓰지 마세요. 바로 "## 1. 회의 개요"부터 시작하세요.
            
            [출력 예시]:
            ## 1. 핵심 요약
            - 주요 안건에 대한 요약...
            
            ## 2. 상세 논의 내용
            - 세부 사항 1...
            
            ## 3. 향후 추진 일정
            | 과제 | 담당 | 기한 |
            | :--- | :--- | :--- |
            | 과제내용 | 담당부서 | 2024-00-00 |

            [분석할 자료]:
            ${text}`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                let aiMsg = data.candidates[0].content.parts[0].text;
                
                // [95% 핵심] 사족 잘라내기 필터
                const startIdx = aiMsg.indexOf('##');
                if(startIdx !== -1) aiMsg = aiMsg.substring(startIdx);

                document.getElementById('output-area').innerHTML = `
                    <div class="a4-page">
                        <h1 class="text-center text-3xl font-black mb-10 pb-4 border-b-2">회 의 록</h1>
                        <div class="edit-field markdown-body text-justify">${marked.parse(aiMsg)}</div>
                    </div>`;
            } catch (e) { alert("분석 실패"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function toggleEdit() {
            isEdit = !isEdit;
            document.querySelectorAll('.edit-field').forEach(el => {
                el.contentEditable = isEdit;
                el.classList.toggle('edit-active', isEdit);
            });
            document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "내용 수정";
        }
    </script>
</body>
</html>
