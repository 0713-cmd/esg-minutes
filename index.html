<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 지능형 마스터 V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #F8FAFC; overflow: hidden; }
        .minutes-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto 30px; box-shadow: 0 10px 50px rgba(0,0,0,0.05); padding: 30mm 25mm; position: relative; display: none; }
        .active-page { display: block; }
        #loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex h-screen">

    <div id="loading">
        <i class="fas fa-spinner fa-spin text-5xl text-blue-600 mb-4"></i>
        <p class="font-bold text-slate-700">5인 AI 에이전트가 코웨이 보고서 맥락을 분석 중입니다...</p>
    </div>

    <aside class="w-72 bg-[#0F172A] text-slate-400 flex flex-col shrink-0">
        <div class="p-10 border-b border-white/5 text-center">
            <h2 class="text-xl font-black text-white italic tracking-tighter uppercase">Coway ESG</h2>
        </div>
        <nav class="flex-grow py-10 px-6 space-y-3">
            <div onclick="location.reload()" class="flex items-center gap-4 p-4 rounded-xl cursor-pointer bg-white/10 text-white font-bold"><i class="fas fa-home"></i> 회의록 생성</div>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-full">
        <header class="h-32 bg-white border-b flex flex-col items-center justify-center px-12 relative shadow-sm">
            <h1 class="text-2xl font-black text-slate-900 mb-5">지능형 회의록 협업 시스템</h1>
            <div class="flex gap-3">
                <button onclick="handlePaste()" class="px-8 py-2.5 bg-blue-600 text-white rounded-full font-bold shadow-lg hover:scale-105 transition-all"><i class="fas fa-paste mr-2"></i> 데이터 분석 시작</button>
            </div>
            <div id="toolbar" class="absolute right-12 bottom-9 hidden flex gap-2">
                <button onclick="window.print()" class="px-5 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-xs">PDF 저장</button>
            </div>
        </header>

        <div id="viewport" class="flex-grow overflow-y-auto py-12">
            <div id="empty-msg" class="h-full flex flex-col items-center justify-center text-slate-200">
                <i class="fas fa-file-signature text-8xl mb-6 opacity-20"></i>
                <p class="text-xl font-black tracking-widest opacity-30 italic uppercase">Awaiting Analysis</p>
            </div>
            <div id="minutes-area" class="hidden">
                <article class="minutes-page active-page">
                    <div class="border-b-8 border-slate-900 pb-10 mb-16">
                        <h2 class="text-3xl font-black text-slate-900">회의록 분석 결과</h2>
                    </div>
                    <div class="space-y-12">
                        <section><h3 class="text-sm font-black text-blue-600 mb-6 uppercase tracking-widest italic">Ⅰ. 핵심 성과 요약</h3><div id="res-sum" class="bg-slate-50 p-10 rounded-3xl border italic text-slate-700 leading-relaxed"></div></section>
                        <section><h3 class="text-sm font-black text-blue-600 mb-8 uppercase tracking-widest italic">Ⅱ. 상세 논의 사항</h3><div id="res-det" class="pl-8 space-y-4 text-slate-800"></div></section>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <script>
        async function runAI(input) {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "당신은 코웨이 ESG 전문가입니다. 다음 내용을 삼성전자 표준 양식의 개조식(~함) 회의록으로 작성해줘:\n\n" + input }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                // 답변 추출 로직 보강
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('empty-msg').classList.add('hidden');
                document.getElementById('minutes-area').classList.remove('hidden');
                document.getElementById('toolbar').classList.remove('hidden');
                
                // 간단한 텍스트 분리
                const parts = aiText.split('\n\n');
                document.getElementById('res-sum').innerText = parts[0] || "요약 내용을 생성하지 못했습니다.";
                document.getElementById('res-det').innerHTML = parts.slice(1).join('<br>').replace(/-/g, '•');
                
            } catch (e) {
                console.error(e);
                alert("분석 오류: " + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function handlePaste() {
            const t = prompt("회의 내용을 입력하거나 붙여넣으세요.");
            if(t) runAI(t);
        }
    </script>
</body>
</html>
