<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 지능형 마스터 V16 (Gemini 3.0 Hybrid)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0F172A; overflow: hidden; }
        .minutes-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto 30px; padding: 30mm 25mm; display: none; box-shadow: 0 0 60px rgba(0,0,0,0.6); }
        .active-page { display: block; }
        #loading, #input-canvas { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .recording-on { animation: pulse 1.5s infinite; color: #EF4444 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex h-screen text-slate-300">

    <div id="loading">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-blue-500 rounded-full animate-spin"></div>
        </div>
        <p class="text-3xl font-black italic text-white tracking-widest animate-pulse uppercase">Gemini 3.0 Engine Analyzing...</p>
    </div>

    <div id="input-canvas" class="p-10 flex flex-col">
        <div class="w-full max-w-7xl mx-auto flex flex-col h-full gap-8">
            <div class="flex justify-between items-end border-b border-white/10 pb-6">
                <div>
                    <h2 class="text-5xl font-black text-white italic tracking-tighter uppercase">Coway Data Canvas</h2>
                    <p class="text-blue-400 font-bold mt-2 uppercase tracking-[0.3em]">분석할 모든 데이터를 여기에 쏟아부으세요</p>
                </div>
                <button onclick="closeCanvas()" class="text-slate-500 hover:text-white transition-all"><i class="fas fa-times text-5xl"></i></button>
            </div>
            <textarea id="huge-input" class="flex-grow w-full bg-slate-800/30 border-2 border-slate-700 rounded-[4rem] p-16 text-white text-2xl leading-relaxed focus:outline-none focus:border-blue-500 transition-all shadow-[inset_0_0_100px_rgba(0,0,0,0.5)]" placeholder="회의 전사본, 텍스트 등을 붙여넣으세요..."></textarea>
            <button onclick="executeEngine()" class="h-28 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-[2.5rem] text-4xl font-black shadow-2xl shadow-blue-500/30 transform active:scale-95 transition-all">분석 엔진 가동</button>
        </div>
    </div>

    <aside class="w-80 bg-slate-900 flex flex-col shrink-0 border-r border-white/5">
        <div class="p-12 border-b border-white/5 text-center">
            <h1 class="text-3xl font-black text-white italic tracking-tighter">COWAY</h1>
            <p class="text-[10px] text-blue-500 font-black tracking-[0.5em] mt-2 italic">MASTER V16</p>
        </div>
        <nav class="flex-grow p-8 space-y-4">
            <div onclick="location.reload()" class="p-6 bg-white/5 rounded-3xl text-white font-bold cursor-pointer hover:bg-white/10 flex items-center gap-4"><i class="fas fa-plus-circle text-blue-400"></i> 새 세션</div>
            
            <div class="mt-20 p-6 bg-slate-800 rounded-3xl border border-white/5">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4 italic text-center">Direct API Access</p>
                <input type="password" id="user-api-key" placeholder="API 키를 직접 입력하세요" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-blue-500 transition-all mb-2">
                <p class="text-[9px] text-slate-500 leading-relaxed text-center">오류 발생 시 AI Studio의 키를<br>여기에 직접 입력하세요.</p>
            </div>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col relative bg-slate-800">
        <header class="h-48 bg-slate-900 border-b border-white/5 flex flex-col items-center justify-center px-12 relative shadow-2xl">
            <h2 class="text-2xl font-black text-white mb-8 tracking-tighter italic uppercase opacity-60">ESG Decision Intelligence</h2>
            <div class="flex gap-6">
                <button id="rec-btn" onclick="toggleRec()" class="px-12 py-5 bg-red-500/5 text-red-500 rounded-full font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition-all shadow-xl">
                    <i id="rec-icon" class="fas fa-microphone mr-3"></i> 실시간 녹음
                </button>
                <button onclick="document.getElementById('file-in').click()" class="px-12 py-5 bg-slate-700 text-white rounded-full font-black hover:bg-slate-600 transition-all border border-white/5 shadow-2xl">
                    <i class="fas fa-file-waveform mr-3"></i> 파일 분석
                    <input type="file" id="file-in" class="hidden" accept=".docx,.xlsx,.txt">
                </button>
                <button onclick="openCanvas()" class="px-12 py-5 bg-blue-600 text-white rounded-full font-black shadow-2xl shadow-blue-500/40 hover:scale-105 active:scale-95 transition-all">
                    <i class="fas fa-expand-arrows-alt mr-3"></i> 데이터 캔버스
                </button>
            </div>
            <div id="toolbar" class="absolute right-12 bottom-12 hidden flex gap-4">
                <button onclick="window.print()" class="px-8 py-3 bg-white text-slate-900 rounded-2xl font-black text-sm">PDF 다운로드</button>
            </div>
        </header>

        <div id="viewport" class="flex-grow overflow-y-auto py-20 scrollbar-hide">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-700">
                <i class="fas fa-dna text-[15rem] mb-12 opacity-10"></i>
                <p class="text-3xl font-black tracking-[0.6em] opacity-20 uppercase italic underline decoration-blue-500/20 underline-offset-[20px]">System Online</p>
            </div>

            <div id="minutes-area" class="hidden">
                <article class="minutes-page active-page">
                    <div class="border-b-[20px] border-slate-900 pb-16 mb-24 flex justify-between items-end">
                        <h2 class="text-6xl font-black text-slate-900 tracking-tighter italic">ESG Minutes</h2>
                        <p class="text-sm font-black text-slate-400 tracking-widest uppercase">Secretariat Report</p>
                    </div>
                    <div class="space-y-24">
                        <section><h3 class="text-sm font-black text-blue-600 mb-10 uppercase tracking-[0.6em] italic underline decoration-[10px] underline-offset-[12px]">Ⅰ. Executive Summary</h3><div id="res-sum" class="bg-slate-50 p-16 rounded-[4rem] border border-slate-100 text-slate-900 leading-relaxed font-bold text-2xl shadow-inner" contenteditable="true"></div></section>
                        <section><h3 class="text-sm font-black text-blue-600 mb-12 uppercase tracking-[0.6em] italic underline decoration-[10px] underline-offset-[12px]">Ⅱ. Discussion Points</h3><div id="res-det" class="pl-12 space-y-10 text-slate-900 leading-loose text-xl" contenteditable="true"></div></section>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <script>
        const PROMPT = `당신은 코웨이 ESG 수석 분석팀입니다. 입력된 자료를 삼성전자 표준 양식의 한글 개조식(~함) 회의록으로 치밀하게 작성하십시오.`;
        let isRec = false; let rec; let transcript = "";

        function openCanvas() { document.getElementById('input-canvas').style.display = 'flex'; }
        function closeCanvas() { document.getElementById('input-canvas').style.display = 'none'; }

        async function executeEngine() {
            const val = document.getElementById('huge-input').value;
            if(val.length < 5) return alert("데이터를 입력해주세요.");
            closeCanvas();
            runAI(val);
        }

        async function runAI(input) {
            const userKey = document.getElementById('user-api-key').value;
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': userKey // 직접 입력한 키를 헤더로 보냅니다
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: PROMPT + "\n\n회의 데이터:\n" + input }] }]
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                const text = data.candidates[0].content.parts[0].text;
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('minutes-area').classList.remove('hidden');
                document.getElementById('toolbar').classList.remove('hidden');
                
                const lines = text.split('\n');
                document.getElementById('res-sum').innerText = lines.slice(0, 10).join(' ');
                document.getElementById('res-det').innerHTML = lines.slice(10).map(l => l.trim().startsWith('-') || l.trim().startsWith('*') ? `• ${l.substring(1).trim()}<br>` : `${l}<br>`).join('');
            } catch (e) {
                alert("분석 엔진 가동 오류:\n" + e.message + "\n\n[조치] 좌측 하단에 API 키를 직접 입력하고 다시 시도해보세요.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function toggleRec() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return alert("크롬을 사용하세요.");
            if (!isRec) {
                rec = new Speech(); rec.lang = 'ko-KR'; rec.continuous = true;
                rec.onresult = (e) => { for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) transcript += e.results[i][0].transcript; } };
                rec.start(); isRec = true;
                document.getElementById('rec-icon').classList.add('recording-on');
            } else {
                rec.stop(); isRec = false;
                document.getElementById('rec-icon').classList.remove('recording-on');
                if(transcript) runAI(transcript);
            }
        }
        document.getElementById('file-in').onchange = (e) => { runAI("파일 통합 분석 가동 중..."); };
    </script>
</body>
</html>
