<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 지능형 협업 시스템 V26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f4f7f9; margin: 0; overflow: hidden; }
        :root { --coway-blue: #00A9E0; }
        .a4-container { height: calc(100vh - 180px); overflow-y: auto; padding: 40px 0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 15mm; position: relative; border: none !important; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: none; }
        .active-page { display: block; }
        /* 폰트 규격: 제목 14pt, 본문 12pt */
        .content-text { font-size: 12pt; line-height: 1.6; color: #1a1a1a; text-align: justify; word-break: keep-all; }
        .title-text { font-size: 14pt; font-weight: bold; color: #000; margin-bottom: 8px; border-left: 5px solid var(--coway-blue); padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; border: 1.5px solid #000; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 8px; font-size: 12pt; text-align: left; }
        th { background: #f8fafc; color: var(--coway-blue); text-align: center; font-weight: bold; width: 130px; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .edit-active { outline: 3px solid var(--coway-blue) !important; background: #fffdeb !important; }
        .pdf-mode { box-shadow: none !important; margin: 0 !important; border: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="w-16 h-16 border-4 border-blue-100 border-t-blue-500 rounded-full animate-spin mb-6"></div>
        <p class="text-2xl font-black text-slate-800">지능형 분석팀이 무결점 회의록을 생성 중입니다...</p>
    </div>

    <header class="h-44 bg-white border-b flex flex-col items-center justify-center shrink-0 no-print z-50 shadow-sm">
        <h1 class="text-3xl font-black text-slate-900 mb-8">Coway ESG 회의록 생성 프로그램</h1>
        <div class="flex items-center gap-4">
            <button id="rec-btn" onclick="toggleRecording()" class="px-8 py-3 bg-red-50 text-red-600 rounded-full font-bold border border-red-100 transition-all"><i class="fas fa-microphone mr-2"></i>실시간 녹음</button>
            <button onclick="document.getElementById('audio-in').click()" class="px-8 py-3 bg-orange-50 text-orange-600 rounded-full font-bold border border-orange-100"><i class="fas fa-file-audio mr-2"></i>음성 파일</button>
            <button onclick="document.getElementById('file-in').click()" class="px-8 py-3 bg-slate-900 text-white rounded-full font-bold shadow-lg"><i class="fas fa-file-word mr-2"></i>워드/엑셀</button>
            <button onclick="openCanvas()" class="px-8 py-3 bg-sky-600 text-white rounded-full font-bold shadow-lg"><i class="fas fa-keyboard mr-2"></i>글 붙여넣기</button>
            <input type="file" id="audio-in" class="hidden" accept="audio/*">
            <input type="file" id="file-in" class="hidden" accept=".docx,.xlsx">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 p-8 space-y-10">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">양식 선택</label>
                <select id="tpl-select" onchange="renderResult()" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm mt-3 text-sky-400 font-bold outline-none">
                    <option value="report">01. 표준 보고서형</option>
                    <option value="grid">02. 데이터 그리드형</option>
                    <option value="memo">03. 심플 메모형</option>
                </select>
            </div>
            <div class="space-y-3">
                <button id="edit-btn" onclick="toggleEdit()" class="w-full py-4 bg-slate-700 rounded-2xl font-bold text-sm">수정 시작</button>
                <button onclick="savePDF()" class="w-full py-4 bg-sky-600 rounded-2xl font-black text-sm shadow-xl">PDF 저장</button>
            </div>
        </aside>

        <main class="flex-grow bg-[#f0f3f6] a4-container">
            <div id="result-view"></div>
        </main>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-slate-900/95 z-[1000] hidden flex items-center justify-center p-12">
        <div class="w-full max-w-7xl h-full flex flex-col gap-6">
            <h3 class="text-white text-3xl font-black">DATA INPUT CANVAS</h3>
            <textarea id="raw-text" class="flex-grow bg-slate-800 border-2 border-slate-700 rounded-[3rem] p-12 text-white text-xl outline-none focus:border-sky-500 shadow-inner" placeholder="분석할 내용을 입력하세요..."></textarea>
            <div class="flex gap-6">
                <button onclick="closeCanvas()" class="flex-1 py-6 bg-slate-700 text-white rounded-3xl font-bold text-xl">닫기</button>
                <button onclick="processAI('text')" class="flex-[2] py-6 bg-sky-600 text-white rounded-3xl font-black text-2xl shadow-xl">회의록 생성 시작</button>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false; let minutesData = null; let recognition; let isRecording = false;

        function openCanvas() { document.getElementById('input-modal').classList.remove('hidden'); }
        function closeCanvas() { document.getElementById('input-modal').classList.add('hidden'); }

        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) return alert("크롬 브라우저를 사용해주세요.");
            if (!isRecording) {
                recognition = new webkitSpeechRecognition();
                recognition.lang = 'ko-KR'; recognition.continuous = true;
                recognition.start(); isRecording = true;
                document.getElementById('rec-btn').classList.add('bg-red-600', 'text-white');
                document.getElementById('rec-btn').innerText = "녹음 중지";
            } else {
                recognition.stop(); isRecording = false;
                document.getElementById('rec-btn').classList.remove('bg-red-600', 'text-white');
                document.getElementById('rec-btn').innerText = "실시간 녹음";
            }
        }

        document.getElementById('file-in').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => mammoth.extractRawText({arrayBuffer: ev.target.result}).then(r => processAI(r.value));
            reader.readAsArrayBuffer(file);
        };

        async function processAI(content) {
            const input = content === 'text' ? document.getElementById('raw-text').value : content;
            if(!input) return;
            closeCanvas(); document.getElementById('loader').style.display = 'flex';

            // [핵심] JSON 형식으로 답변을 강제하여 데이터 뒤섞임 원천 차단
            const PROMPT = `당신은 15년차 대기업 비서실장 3인 팀입니다. 오직 [자료]의 사실만 사용합니다.
            출력은 반드시 다른 설명 없이 순수 JSON 형식만 사용하십시오:
            {
              "title": "회의 제목",
              "date": "2024.09.04. 13:30",
              "dept": "상생구매팀",
              "summary": "핵심요약 3문장 이내 (중복 정보 삭제)",
              "details": "구조화된 본문 내용 (개조식, 1칸 줄바꿈)",
              "schedule": [{"task": "과제명", "owner": "담당부서", "due": "기한"}]
            }`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT + "\n\n[자료]:\n" + input }] }] })
                });
                const data = await res.json();
                const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                minutesData = JSON.parse(cleanJson);
                renderResult();
            } catch (e) { alert("데이터 분석 오류: 자료를 다시 확인해주세요."); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function renderResult() {
            if(!minutesData) return;
            const tpl = document.getElementById('tpl-select').value;
            const view = document.getElementById('result-view');
            view.innerHTML = '';

            const scheduleRows = minutesData.schedule.map(s => `<tr><td class="edit-field">${s.task}</td><td class="edit-field text-center">${s.owner}</td><td class="edit-field text-center">${s.due}</td></tr>`).join('');

            let html = '';
            if (tpl === 'report') {
                html = `
                    <div class="a4-page active-page" id="pdf-area">
                        <h2 class="text-center text-[24pt] font-black mb-12 border-b-4 border-black pb-4">회 의 록</h2>
                        <table>
                            <tr><th width="120">회의 명칭</th><td colspan="3" class="edit-field">${minutesData.title}</td></tr>
                            <tr><th>회의 일시</th><td class="edit-field">${minutesData.date}</td><th width="100">소속</th><td class="edit-field">${minutesData.dept}</td></tr>
                        </table>
                        <h3 class="title-text mt-8">1. 핵심 요약</h3><div class="content-text edit-field mb-10" style="white-space: pre-wrap;">${minutesData.summary}</div>
                        <h3 class="title-text">2. 세부 논의 사항</h3><div class="content-text edit-field mb-10" style="white-space: pre-wrap;">${minutesData.details}</div>
                        <h3 class="title-text">3. 향후 추진 일정</h3>
                        <table><thead><tr><th>추진 과제</th><th>담당</th><th>기한</th></tr></thead><tbody>${scheduleRows}</tbody></table>
                    </div>`;
            } else if (tpl === 'grid') {
                html = `<div class="a4-page active-page" id="pdf-area"><h2 class="text-2xl font-black mb-8 border-l-8 border-[#00A9E0] pl-4">${minutesData.title}</h2><table><tr><th class="w-1/4">핵심 요약</th><td class="edit-field" style="white-space: pre-wrap;">${minutesData.summary}</td></tr><tr><th>상세 논의</th><td class="edit-field" style="white-space: pre-wrap;">${minutesData.details}</td></tr></table></div>`;
            } else {
                html = `<div class="a4-page active-page" id="pdf-area" style="padding: 25mm;"><div class="content-text edit-field leading-[2]" style="white-space: pre-wrap;">${minutesData.summary}\n\n${minutesData.details}</div></div>`;
            }
            view.innerHTML = html;
            if(isEdit) refreshEdit();
        }

        function toggleEdit() {
            isEdit = !isEdit; refreshEdit();
            document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "수정 시작";
            document.getElementById('edit-btn').className = isEdit ? "w-full py-4 bg-green-600 rounded-2xl font-bold" : "w-full py-4 bg-slate-700 rounded-2xl font-bold";
        }
        function refreshEdit() {
            document.querySelectorAll('.edit-field').forEach(el => { el.contentEditable = isEdit; el.classList.toggle('edit-active', isEdit); });
        }
        function savePDF() {
            const el = document.getElementById('pdf-area');
            el.classList.add('pdf-mode');
            const opt = { margin: 0, filename: 'Coway_Report.pdf', image: { type: 'jpeg', quality: 1.0 }, html2canvas: { scale: 3, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(el).save().then(() => el.classList.remove('pdf-mode'));
        }
    </script>
</body>
</html>
