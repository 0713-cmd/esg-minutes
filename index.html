<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 지능형 마스터 V14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0F172A; overflow: hidden; }
        .minutes-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto 30px; padding: 30mm 25mm; display: none; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .active-page { display: block; }
        #loading, #input-canvas { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .recording-on { animation: pulse 1.5s infinite; color: #EF4444 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex h-screen text-slate-300">

    <div id="loading">
        <i class="fas fa-dna fa-spin text-7xl text-blue-400 mb-8"></i>
        <p class="text-2xl font-black italic tracking-widest text-white">5인 AI 에이전트가 코웨이 보고서와 회의를 융합 분석 중...</p>
    </div>

    <div id="input-canvas" class="p-10 flex flex-col">
        <div class="w-full max-w-7xl mx-auto flex flex-col h-full gap-6">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-4xl font-black text-white italic tracking-tighter">DATA INPUT CANVAS</h2>
                    <p class="text-blue-400 text-sm mt-2 font-bold uppercase tracking-widest">분석할 내용을 아래에 마음껏 펼쳐놓으세요</p>
                </div>
                <button onclick="closeCanvas()" class="text-slate-500 hover:text-white transition-all"><i class="fas fa-times text-4xl"></i></button>
            </div>
            <textarea id="huge-input" class="flex-grow w-full bg-slate-800/50 border-4 border-slate-700 rounded-[3rem] p-12 text-white text-xl leading-relaxed focus:outline-none focus:border-blue-500 transition-all shadow-2xl" placeholder="여기에 대화 전사본, 엑셀 텍스트, 워드 내용 등을 자유롭게 붙여넣으세요..."></textarea>
            <button onclick="executeEngine()" class="h-24 bg-blue-600 hover:bg-blue-500 text-white rounded-[2rem] text-3xl font-black shadow-2xl shadow-blue-500/20 transform active:scale-95 transition-all uppercase">에이전트 분석 엔진 가동</button>
        </div>
    </div>

    <aside class="w-80 bg-slate-900 flex flex-col shrink-0 border-r border-white/5">
        <div class="p-12 border-b border-white/5">
            <h1 class="text-2xl font-black text-white italic tracking-tighter uppercase">Coway ESG</h1>
            <p class="text-[10px] text-blue-500 font-bold tracking-[0.4em] mt-2">INTELLIGENT MASTER V14</p>
        </div>
        <nav class="p-8 space-y-4">
            <div onclick="location.reload()" class="p-5 bg-white/5 rounded-2xl text-white font-bold cursor-pointer hover:bg-white/10 transition-all flex items-center gap-4"><i class="fas fa-redo"></i> 새 회의 작성</div>
            <div class="p-6 bg-blue-900/20 border border-blue-500/20 rounded-3xl mt-12">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">Training Status</p>
                <p class="text-xs leading-relaxed text-slate-300 italic">2020-2025 지속경영보고서<br>핵심 맥락 로드 완료</p>
            </div>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col relative bg-slate-800">
        <header class="h-44 bg-slate-900 border-b border-white/5 flex flex-col items-center justify-center px-12 relative">
            <h2 class="text-xl font-bold text-white mb-8 tracking-tight">의사결정 지원 시스템</h2>
            <div class="flex gap-4">
                <button id="rec-btn" onclick="toggleRec()" class="px-10 py-4 bg-red-500/10 text-red-500 rounded-full font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">
                    <i id="rec-icon" class="fas fa-microphone mr-2"></i> <span id="rec-text">실시간 녹음</span>
                </button>
                <button onclick="document.getElementById('file-in').click()" class="px-10 py-4 bg-slate-700 text-white rounded-full font-black hover:bg-slate-600 transition-all shadow-xl">
                    <i class="fas fa-file-medical mr-2"></i> 파일 통합 분석
                    <input type="file" id="file-in" class="hidden" accept=".docx,.xlsx,.txt">
                </button>
                <button onclick="openCanvas()" class="px-10 py-4 bg-blue-600 text-white rounded-full font-black shadow-xl shadow-blue-500/20 hover:scale-105 transition-all">
                    <i class="fas fa-layer-group mr-2"></i> 분석 데이터 캔버스
                </button>
            </div>
            <div id="toolbar" class="absolute right-12 bottom-10 hidden flex gap-3">
                <button onclick="window.print()" class="px-6 py-3 bg-white text-slate-900 rounded-xl font-black text-xs">PDF 저장</button>
                <button onclick="exportPPT()" class="px-6 py-3 bg-blue-500 text-white rounded-xl font-black text-xs">PPT 생성</button>
            </div>
        </header>

        <div id="viewport" class="flex-grow overflow-y-auto py-16 scrollbar-hide">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center">
                <i class="fas fa-project-diagram text-[12rem] text-slate-700 mb-10 opacity-20"></i>
                <p class="text-2xl font-black tracking-[0.5em] text-slate-600 uppercase italic">Pipeline Awaiting Data</p>
            </div>

            <div id="minutes-area" class="hidden">
                <article class="minutes-page active-page">
                    <div class="border-b-[16px] border-slate-900 pb-12 mb-20 flex justify-between items-end">
                        <h2 class="text-5xl font-black text-slate-900 tracking-tighter italic">ESG Minutes</h2>
                        <span class="text-xs font-black text-slate-400 tracking-widest uppercase">Secretariat Report</span>
                    </div>
                    <div class="space-y-20">
                        <section><h3 class="text-sm font-black text-blue-600 mb-8 uppercase tracking-[0.5em] italic underline decoration-8 underline-offset-8">Ⅰ. Executive Summary</h3><div id="res-sum" class="bg-slate-50 p-12 rounded-[3rem] border border-slate-100 text-slate-800 leading-relaxed font-bold text-xl shadow-inner" contenteditable="true"></div></section>
                        <section><h3 class="text-sm font-black text-blue-600 mb-10 uppercase tracking-[0.5em] italic underline decoration-8 underline-offset-8">Ⅱ. Decision Points</h3><div id="res-det" class="pl-8 space-y-8 text-slate-900 leading-loose text-lg" contenteditable="true"></div></section>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <script>
        const PROMPT = `당신은 코웨이 ESG 수석 컨설턴트 5인(정제, 맥락, 요약, 과제, 편집)입니다. 코웨이의 5년치 지속경영보고서 맥락(Closed-loop, REC 거래 등)을 배경 지식으로 하여, 입력된 내용을 삼성전자 표준 보고 양식의 한글 개조식(~함) 회의록으로 아주 치밀하게 작성하십시오.`;

        let isRec = false; let recognition; let transcript = "";

        function openCanvas() { document.getElementById('input-canvas').style.display = 'flex'; }
        function closeCanvas() { document.getElementById('input-canvas').style.display = 'none'; }

        async function executeEngine() {
            const val = document.getElementById('huge-input').value;
            if(val.length < 5) return alert("분석할 내용을 입력해주세요.");
            closeCanvas();
            runAI(val);
        }

        async function runAI(input) {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: PROMPT + "\n\n회의 데이터:\n" + input }] }]
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                const text = data.candidates[0].content.parts[0].text;
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('minutes-area').classList.remove('hidden');
                document.getElementById('toolbar').classList.remove('hidden');
                
                const lines = text.split('\n');
                document.getElementById('res-sum').innerText = lines.slice(0, 10).join(' ');
                document.getElementById('res-det').innerHTML = lines.slice(10).map(l => l.trim().startsWith('-') || l.trim().startsWith('*') ? `• ${l.substring(1).trim()}<br>` : `${l}<br>`).join('');
            } catch (e) {
                alert("엔진 가동 오류: " + e.message + "\n\n모델명을 2.0-flash로 변경했으니 Vercel에서 Redeploy 확인 바랍니다.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function toggleRec() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Rec) return alert("크롬을 사용하세요.");
            if (!isRec) {
                recognition = new Rec(); recognition.lang = 'ko-KR'; recognition.continuous = true;
                recognition.onresult = (e) => { for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) transcript += e.results[i][0].transcript; } };
                recognition.start(); isRec = true;
                document.getElementById('rec-icon').classList.add('recording-on');
                document.getElementById('rec-text').innerText = "분석 종료";
            } else {
                recognition.stop(); isRec = false;
                document.getElementById('rec-icon').classList.remove('recording-on');
                document.getElementById('rec-text').innerText = "실시간 녹음";
                if(transcript) runAI(transcript);
            }
        }
        document.getElementById('file-in').onchange = (e) => { runAI("파일 데이터 분석 시뮬레이션 가동 중..."); };
        function exportPPT() { alert("PPT 생성 기능을 준비 중입니다."); }
    </script>
</body>
</html>
