<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 시스템 V39 (Real Flash 3.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f8fafc; margin: 0; overflow: hidden; }
        :root { --coway-blue: #00A9E0; }
        .a4-container { height: calc(100vh - 180px); overflow-y: auto; padding: 20px 0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 15mm; box-shadow: 0 0 25px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1.5px solid #000; background: white; }
        th, td { border: 1px solid #000; padding: 12px; font-size: 11pt; line-height: 1.5; }
        th { background: #f1f5f9 !important; color: var(--coway-blue); font-weight: bold; text-align: center; }
        .title-text { font-size: 14pt; font-weight: bold; color: #000; border-left: 6px solid var(--coway-blue); padding-left: 10px; margin: 30px 0 15px 0; }
        .content-text { font-size: 11pt; line-height: 1.8; color: #1a1a1a; text-align: justify; word-break: keep-all; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .edit-active { outline: 3px solid var(--coway-blue) !important; background: #fffdeb !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="w-14 h-14 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xl font-black text-slate-700">Gemini 3 Flash가 최상의 품질로 집필 중입니다...</p>
    </div>

    <header class="h-44 bg-white border-b flex flex-col items-center justify-center shrink-0 shadow-sm px-10">
        <h1 class="text-2xl font-black text-slate-800 mb-6">Coway ESG 회의록 마스터 V39</h1>
        <div class="flex gap-4">
            <button id="mic-btn" onclick="startMic()" class="px-6 py-2.5 bg-red-50 text-red-600 rounded-full font-bold border border-red-200">
                <i class="fas fa-microphone mr-2"></i>실시간 녹음
            </button>
            <button onclick="document.getElementById('audio-in').click()" class="px-6 py-2.5 bg-orange-50 text-orange-600 rounded-full font-bold border border-orange-200">
                <i class="fas fa-file-audio mr-2"></i>음성 파일
            </button>
            <button onclick="document.getElementById('word-in').click()" class="px-6 py-2.5 bg-slate-800 text-white rounded-full font-bold">
                <i class="fas fa-file-word mr-2"></i>워드/엑셀 업로드
            </button>
            <button onclick="openInput()" class="px-6 py-2.5 bg-sky-600 text-white rounded-full font-bold">
                <i class="fas fa-keyboard mr-2"></i>글 붙여넣기
            </button>
            <input type="file" id="audio-in" class="hidden" accept="audio/*" onchange="openInput()">
            <input type="file" id="word-in" class="hidden" accept=".docx,.xlsx" onchange="handleWord(this)">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-64 bg-slate-900 p-6 flex flex-col gap-4 no-print shadow-2xl">
            <button onclick="toggleEdit()" id="edit-btn" class="w-full py-4 bg-slate-700 text-white rounded-2xl font-bold">수정 시작</button>
            <button onclick="window.print()" class="w-full py-4 bg-[#00A9E0] text-white rounded-2xl font-black">PDF 저장</button>
        </aside>
        <main class="flex-grow a4-container">
            <div id="output">
                <div class="a4-page text-center pt-40 text-slate-300 font-bold">자료를 입력하면 채팅방과 동일한 퀄리티의 결과가 나옵니다.</div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-10 z-[2000]">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] p-10 flex flex-col gap-6 shadow-2xl">
            <h2 class="text-3xl font-black">DATA INPUT</h2>
            <textarea id="input-area" class="w-full h-[50vh] p-6 border rounded-3xl outline-none text-lg" placeholder="내용을 확인하세요..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeInput()" class="flex-1 py-4 bg-slate-100 rounded-2xl">닫기</button>
                <button onclick="runAnalysis()" class="flex-[3] py-4 bg-sky-600 text-white rounded-2xl font-black text-xl shadow-xl">분석 시작</button>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false; let store = null;

        function openInput() { document.getElementById('modal').classList.remove('hidden'); }
        function closeInput() { document.getElementById('modal').classList.add('hidden'); }

        function startMic() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("크롬을 쓰세요.");
            const r = new Speech(); r.lang = 'ko-KR';
            r.onstart = () => { document.getElementById('mic-btn').innerText = "듣고 있습니다..."; };
            r.onresult = (e) => { document.getElementById('input-area').value += e.results[0][0].transcript + " "; openInput(); };
            r.onend = () => { document.getElementById('mic-btn').innerText = "실시간 녹음"; };
            r.start();
        }

        async function handleWord(input) {
            const file = input.files[0];
            if(!file) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                document.getElementById('input-area').value = res.value;
                openInput();
            } catch (e) { alert("워드 분석 에러"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function runAnalysis() {
            const text = document.getElementById('input-area').value;
            if(!text.trim()) return;
            closeInput(); document.getElementById('loader').style.display = 'flex';

            // [차장님 만족 100% 프롬프트 이식]
            const prompt = `당신은 코웨이 상생구매팀 비서실장입니다. 다음 자료를 바탕으로 image_bd1a7c.png와 100% 동일한 고품격 스타일로 회의록을 작성하세요.
            반드시 [[제목]], [[요약]], [[본문]], [[일정]] 섹션을 나누십시오.
            특히 [[일정]] 섹션은 반드시 '추진 과제|담당 부서|기한' 형식을 지켜주세요.
            
            [자료]:\n${text}`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                
                const parse = (tag) => {
                    const start = aiMsg.indexOf(`[[${tag}]]`);
                    if(start === -1) return "";
                    let end = aiMsg.indexOf("[[", start + 2);
                    if(end === -1) end = aiMsg.length;
                    return aiMsg.substring(start + tag.length + 4, end).trim();
                };

                store = { title: parse("제목"), summary: parse("요약"), details: parse("본문") || aiMsg, tasks: parse("일정") };
                render();
            } catch (e) { alert("네트워크 에러"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function render() {
            // 표 파싱 보강: 줄바꿈과 파이프를 더 유연하게 처리
            const rows = store.tasks.split('\n')
                .filter(l => l.includes('|'))
                .map(line => `<tr>${line.split('|').map(c => `<td class="edit-field">${c.trim()}</td>`).join('')}</tr>`)
                .join('');

            document.getElementById('output').innerHTML = `
                <div class="a4-page">
                    <h1 class="text-center text-3xl font-black mb-12 border-b-2 pb-4">회 의 록</h1>
                    <table>
                        <tr><th width="150">회의 명칭</th><td class="edit-field font-bold">${store.title}</td></tr>
                        <tr><th>회의 일시</th><td>2024. 09. 04. 13:30 (상생구매팀)</td></tr>
                    </table>
                    <div class="title-text">1. 핵심 요약</div>
                    <div class="edit-field content-text mb-10">${store.summary}</div>
                    <div class="title-text">2. 상세 논의 내용</div>
                    <div class="edit-field content-text mb-10">${store.details}</div>
                    <div class="title-text">3. 향후 추진 일정</div>
                    <table>
                        <thead><tr><th>추진 과제</th><th>담당 부서</th><th>기한</th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="3" class="text-center text-slate-400">일정 데이터 파싱 중... (수정 시작을 눌러 수동 입력 가능)</td></tr>'}</tbody>
                    </table>
                </div>`;
            if(isEdit) refreshEdit();
        }

        function toggleEdit() { isEdit = !isEdit; refreshEdit(); document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "수정 시작"; }
        function refreshEdit() { document.querySelectorAll('.edit-field').forEach(el => { el.contentEditable = isEdit; el.classList.toggle('edit-active', isEdit); }); }
    </script>
</body>
</html>
