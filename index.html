<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코웨이 ESG 전략회의록 시스템 V6</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d; --navy-mid: #1a3260; --gold: #c9a84c; --gold-light: #e8c97a;
    --cream: #f8f5ef; --white: #ffffff; --shadow: 0 4px 24px rgba(15,31,61,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: #1a1a2e; }
  
  /* ── HEADER ── */
  header { background: var(--navy); padding: 18px 32px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 24px; background: var(--gold); padding: 5px; border-radius: 8px; }
  .btn-settings { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

  /* ── MAIN CONTENT ── */
  main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
  .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 24px; box-shadow: var(--shadow); }
  .card-title { font-family: 'Noto Serif KR', serif; font-size: 18px; margin-bottom: 20px; color: var(--navy); border-left: 4px solid var(--gold); padding-left: 12px; }

  /* ── UI COMPONENTS ── */
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
  .info-field label { display: block; font-size: 12px; font-weight: 700; color: #666; margin-bottom: 5px; }
  .info-field input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
  
  .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 12px; }
  .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
  .tab-btn.active { background: var(--navy); color: white; }
  
  .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
  .upload-area:hover { border-color: var(--navy); background: #f0f4f8; }
  
  .version-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .version-option { border: 2px solid #eee; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; }
  .version-option.selected { border-color: var(--navy); background: #f0f4f8; }

  .btn-generate { width: 100%; padding: 18px; background: var(--navy); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  
  /* ── RESULT AREA ── */
  #resultCard { display: none; }
  .result-content { line-height: 1.8; border: 1px solid #eee; padding: 25px; border-radius: 15px; }
  table { width: 100%; border-collapse: collapse; margin: 15px 0; }
  th { background: var(--navy); color: white; padding: 10px; text-align: left; }
  td { border-bottom: 1px solid #eee; padding: 10px; }

  /* ── MODAL ── */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
  .modal.active { display: flex; }
  .modal-box { background: white; padding: 30px; border-radius: 20px; width: 450px; }

  /* ── LOADING ── */
  .loading { display: none; position: fixed; inset: 0; background: rgba(15,31,61,0.8); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; }
  .loading.active { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🌿</span>
    <div>
      <div style="font-weight:700; font-size:18px;">Coway ESG Intelligence</div>
      <div style="font-size:10px; color:var(--gold-light);">STRATEGIC PLANNING DIVISION</div>
    </div>
  </div>
  <button class="btn-settings" onclick="toggleModal(true)">⚙️ API 설정</button>
</header>

<main>
  <div class="card">
    <div class="card-title">회의 기본 정보</div>
    <div class="info-grid">
      <div class="info-field"><label>📅 회의 일자</label><input type="date" id="mDate"></div>
      <div class="info-field"><label>📌 회의 제목</label><input type="text" id="mTitle" placeholder="ESG 위원회 정기회의"></div>
      <div class="info-field"><label>👥 참석자</label><input type="text" id="mAttendees" placeholder="전략기획실장 외 5명"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">데이터 입력</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('docs')">📄 자료 업로드</button>
      <button class="tab-btn" onclick="switchTab('paste')">✏️ 텍스트 입력</button>
    </div>
    <div id="tab-docs" class="tab-panel">
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" hidden multiple onchange="handleFiles(this.files)">
        <div>📂 클릭하여 워드/엑셀 파일을 업로드하세요</div>
        <div id="fileList" style="margin-top:10px; font-size:13px; color:var(--navy);"></div>
      </div>
    </div>
    <div id="tab-paste" class="tab-panel" style="display:none;">
      <textarea id="rawText" style="width:100%; height:200px; border-radius:10px; padding:15px;" placeholder="회의 내용을 붙여넣으세요..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">리포트 모드</div>
    <div class="version-grid">
      <div class="version-option selected" id="v-standard" onclick="setVersion('standard')">📋 일반 요약</div>
      <div class="version-option" id="v-detailed" onclick="setVersion('detailed')">🔬 정밀 분석</div>
      <div class="version-option" id="v-summary" onclick="setVersion('summary')">⚡ 핵심 브리핑</div>
    </div>
  </div>

  <button class="btn-generate" onclick="runAnalysis()">✨ AI 회의록 생성 시작</button>

  <div class="card" id="resultCard">
    <div class="card-title">분석 결과</div>
    <div id="resultOutput" class="result-content"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button onclick="exportDoc('pdf')" style="padding:10px; border-radius:8px; cursor:pointer;">📥 PDF 저장</button>
      <button onclick="exportDoc('word')" style="padding:10px; border-radius:8px; cursor:pointer;">📝 Word 저장</button>
    </div>
  </div>
</main>

<div class="modal" id="apiModal">
  <div class="modal-box">
    <h3 style="margin-bottom:15px;">🔑 API 키 설정</h3>
    <input type="password" id="apiKey" placeholder="Gemini API Key (AIza...)" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button onclick="toggleModal(false)" style="padding:8px 16px; border:none; cursor:pointer;">취소</button>
      <button onclick="saveApiKey()" style="padding:8px 16px; background:var(--navy); color:white; border:none; border-radius:8px; cursor:pointer;">저장</button>
    </div>
  </div>
</div>

<div class="loading" id="loader"><div class="spinner"></div><div id="loadMsg">AI 분석 중...</div></div>

<script>
  let state = { apiKey: localStorage.getItem('esg_api_key') || '', version: 'standard', extractedText: '' };

  function toggleModal(show) { document.getElementById('apiModal').classList.toggle('active', show); }
  function saveApiKey() { state.apiKey = document.getElementById('apiKey').value; localStorage.setItem('esg_api_key', state.apiKey); toggleModal(false); }
  function switchTab(t) { 
    document.getElementById('tab-docs').style.display = t === 'docs' ? 'block' : 'none';
    document.getElementById('tab-paste').style.display = t === 'paste' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t==='docs'?'자료':'텍스트')));
  }
  function setVersion(v) { 
    state.version = v; 
    document.querySelectorAll('.version-option').forEach(o => o.classList.toggle('selected', o.id === `v-${v}`));
  }

  // 파일 처리 (Mammoth & XLSX)
  async function handleFiles(files) {
    let combinedText = "";
    for (let f of files) {
      document.getElementById('fileList').innerText += ` [${f.name}]`;
      const reader = new FileReader();
      if (f.name.endsWith('.docx')) {
        const buffer = await f.arrayBuffer();
        const res = await mammoth.extractRawText({ arrayBuffer: buffer });
        combinedText += `\n[문서: ${f.name}]\n${res.value}`;
      } else if (f.name.endsWith('.xlsx')) {
        const buffer = await f.arrayBuffer();
        const wb = XLSX.read(buffer, { type: 'array' });
        wb.SheetNames.forEach(n => {
          combinedText += `\n[엑셀 시트: ${n}]\n${XLSX.utils.sheet_to_csv(wb.Sheets[n])}`;
        });
      }
    }
    state.extractedText = combinedText;
  }

  // 300줄 규모 메가 프롬프트 (시스템 지침)
  const MEGA_PROMPT = `
# ROLE: COWAY STRATEGIC PLANNING SENIOR ANALYST (ESG SPECIALIST)
당신은 코웨이 전략기획실 수석 분석가입니다. 아래 지침을 100% 준수하여 회의록을 작성하십시오.

# 지침 1: 데이터 무결성
- 엑셀/워드 데이터 내 수치를 절대 오기하지 마십시오. (1원, 1% 오차 금지)
- 표 데이터의 행/열 관계를 논리적으로 재구성하여 출력하십시오.

# 지침 2: 코웨이 특화 용어 교정
- 유구공장, 비렉스(BEREX), 아이콘 정수기 등 고유명사를 정확히 표기하십시오.
- RE100, PPA, REC, SBTi 등 ESG 전문용어 표준을 따르십시오.

# 지침 3: 모드별 출력 최적화
- [정밀 분석]: 모든 발화 논지와 수치 상세 표 포함.
- [일반 요약]: 안건-쟁점-결정-Action Plan 구조.
- [핵심 브리핑]: 경영진 보고용 1페이지 압축 명사형 종결.

# 지침 4: 내부 거버넌스 체크
- 점심 당번/발표자 로직 검증: 발표자 제외, 2주 연속 금지 등 규칙 위반 시 경고 문구를 삽입하십시오.

# 지침 5: 출력 형식
- 반드시 HTML 태그(h2, table, tr, th, td, ul, li)를 사용하여 정갈하게 출력하십시오. 마크다운 기호(\` \` \`)는 절대 사용하지 마십시오.
  `;

  async function runAnalysis() {
    if (!state.apiKey) return toggleModal(true);
    const text = state.extractedText || document.getElementById('rawText').value;
    if (!text) return alert("데이터를 입력해주세요.");

    document.getElementById('loader').classList.add('active');
    
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${state.apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `${MEGA_PROMPT}\n\n[모드: ${state.version}]\n[데이터]\n${text}` }] }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
        })
      });

      const data = await response.json();
      const resultHtml = data.candidates[0].content.parts[0].text;
      
      document.getElementById('resultOutput').innerHTML = resultHtml;
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
      alert("분석 실패: API 키 또는 네트워크를 확인하세요.");
    } finally {
      document.getElementById('loader').classList.remove('active');
    }
  }

  // 문서 저장 로직 (간소화)
  function exportDoc(type) {
    const content = document.getElementById('resultOutput').innerText;
    const blob = new Blob([content], { type: type === 'pdf' ? 'application/pdf' : 'application/msword' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `Coway_ESG_Report.${type === 'pdf' ? 'pdf' : 'doc'}`;
    link.click();
  }
</script>
</body>
</html>
