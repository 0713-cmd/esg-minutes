<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 시스템 V40 (Zero-Error)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f8fafc; margin: 0; overflow: hidden; }
        .a4-container { height: calc(100vh - 180px); overflow-y: auto; padding: 20px 0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 15mm; box-shadow: 0 0 25px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1.5px solid #000; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 10px; font-size: 11pt; line-height: 1.6; word-break: break-all; }
        th { background: #f1f5f9; color: #00A9E0; font-weight: bold; text-align: center; }
        .title-text { font-size: 14pt; font-weight: bold; border-left: 6px solid #00A9E0; padding-left: 10px; margin: 30px 0 10px 0; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .edit-active { outline: 3px solid #00A9E0 !important; background: #fffdeb !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="w-14 h-14 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xl font-black">대참사 방지를 위해 데이터를 정밀 검수하며 분석 중입니다...</p>
    </div>

    <header class="h-44 bg-white border-b flex flex-col items-center justify-center shrink-0 shadow-sm px-6 no-print">
        <h1 class="text-2xl font-black mb-6">Coway ESG 회의록 시스템 V40</h1>
        <div class="flex gap-4">
            <button onclick="startMic()" class="px-5 py-2.5 bg-red-50 text-red-600 rounded-full font-bold border border-red-200 hover:bg-red-100"><i class="fas fa-microphone mr-2"></i>실시간 녹음</button>
            <button onclick="document.getElementById('audio-in').click()" class="px-5 py-2.5 bg-orange-50 text-orange-600 rounded-full font-bold border border-orange-200"><i class="fas fa-file-audio mr-2"></i>음성 파일</button>
            <button onclick="document.getElementById('word-in').click()" class="px-5 py-2.5 bg-slate-800 text-white rounded-full font-bold"><i class="fas fa-file-word mr-2"></i>워드/엑셀 업로드</button>
            <button onclick="openCanvas()" class="px-5 py-2.5 bg-sky-600 text-white rounded-full font-bold">글 붙여넣기</button>
            <input type="file" id="audio-in" class="hidden" accept="audio/*" onchange="openCanvas()">
            <input type="file" id="word-in" class="hidden" accept=".docx,.xlsx" onchange="handleWord(this)">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-64 bg-slate-900 p-6 flex flex-col gap-4 no-print shadow-xl">
            <button onclick="toggleEdit()" id="edit-btn" class="w-full py-4 bg-slate-700 text-white rounded-2xl font-bold">수정 시작</button>
            <button onclick="window.print()" class="w-full py-4 bg-sky-500 text-white rounded-2xl font-black">PDF 저장</button>
        </aside>
        <main class="flex-grow a4-container">
            <div id="output">
                <div class="a4-page text-center pt-40 text-slate-300 font-bold">V40 버전: 데이터 대참사를 막기 위해 설계를 완전히 변경했습니다.</div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-10 z-[2000]">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] p-10 flex flex-col gap-6">
            <h2 class="text-3xl font-black italic">DATA INPUT CANVAS</h2>
            <textarea id="raw-input" class="w-full h-[50vh] p-6 border-2 border-slate-100 rounded-3xl outline-none" placeholder="자료를 확인하세요..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeCanvas()" class="flex-1 py-5 bg-slate-100 text-slate-500 rounded-2xl font-bold">닫기</button>
                <button onclick="runAnalysis()" class="flex-[3] py-5 bg-sky-600 text-white rounded-2xl font-black text-xl">회의록 생성 시작</button>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false; let store = null;

        function openCanvas() { document.getElementById('modal').classList.remove('hidden'); }
        function closeCanvas() { document.getElementById('modal').classList.add('hidden'); }

        function startMic() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("크롬을 사용하세요.");
            const r = new Speech(); r.lang = 'ko-KR';
            r.onresult = (e) => { document.getElementById('raw-input').value += e.results[0][0].transcript + " "; openCanvas(); };
            r.start();
        }

        async function handleWord(input) {
            const file = input.files[0];
            if(!file) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                document.getElementById('raw-input').value = res.value;
                openCanvas();
            } catch (e) { alert("워드 해독 실패"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function runAnalysis() {
            const text = document.getElementById('raw-input').value;
            if(!text.trim()) return;
            closeCanvas(); document.getElementById('loader').style.display = 'flex';

            // [V40 핵심] AI에게 JSON 형식을 강제로 요구하여 표 깨짐 현상 차단
            const prompt = `당신은 코웨이 비서실장입니다. 다음 자료를 분석하여 "반드시" 아래의 JSON 형식으로만 답변하세요. 마크다운 기호(#, *)를 절대 쓰지 마세요.
            {
              "title": "회의 명칭",
              "summary": "핵심 요약 내용",
              "details": "상세 논의 내용",
              "tasks": [{"item": "과제명", "dept": "담당부서", "due": "기한"}]
            }
            [자료]:\n${text}`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const aiResponse = JSON.parse(data.candidates[0].content.parts[0].text);
                
                store = aiResponse;
                render();
            } catch (e) { alert("데이터 분석 중 대참사 발생: 형식이 맞지 않습니다. 다시 시도해 주세요."); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function render() {
            const rows = store.tasks.map(t => `<tr><td class="edit-field">${t.item}</td><td class="edit-field text-center">${t.dept}</td><td class="edit-field text-center">${t.due}</td></tr>`).join('');

            document.getElementById('output').innerHTML = `
                <div class="a4-page">
                    <h1 class="text-center text-3xl font-black mb-12 pb-4 border-b-2">회 의 록</h1>
                    <table>
                        <tr><th width="150">회의 명칭</th><td class="edit-field font-bold">${store.title}</td></tr>
                        <tr><th>회의 일시</th><td>2024. 09. 04. 13:30 (상생구매팀)</td></tr>
                    </table>
                    <div class="title-text">1. 핵심 요약</div>
                    <div class="edit-field whitespace-pre-wrap mb-10 text-justify">${store.summary}</div>
                    <div class="title-text">2. 상세 논의 내용</div>
                    <div class="edit-field whitespace-pre-wrap mb-10 text-justify">${store.details}</div>
                    <div class="title-text">3. 향후 추진 일정</div>
                    <table>
                        <thead><tr><th>추진 과제</th><th width="150">담당 부서</th><th width="150">기한</th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="3" class="text-center">데이터 없음</td></tr>'}</tbody>
                    </table>
                </div>`;
            if(isEdit) refreshEdit();
        }

        function toggleEdit() { isEdit = !isEdit; refreshEdit(); document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "수정 시작"; }
        function refreshEdit() { document.querySelectorAll('.edit-field').forEach(el => { el.contentEditable = isEdit; el.classList.toggle('edit-active', isEdit); }); }
    </script>
</body>
</html>
