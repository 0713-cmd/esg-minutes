<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 회의록 생성 프로그램 V23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f8fafc; margin: 0; overflow: hidden; }
        :root { --coway-blue: #00A9E0; }

        /* A4 규격 최적화 (PDF 선 제거용 특수 설정) */
        #report-wrapper { background: #f0f2f5; height: calc(100vh - 180px); overflow-y: auto; padding: 40px 0; }
        .a4-page { 
            width: 210mm; min-height: 297mm; background: white; margin: 0 auto; 
            padding: 12.7mm; position: relative; border: none !important;
            box-shadow: 0 0 10px rgba(0,0,0,0.05); display: none;
        }
        .active-page { display: block; }
        
        /* PDF 캡처 시 스타일 강제 조정 */
        .pdf-capture { box-shadow: none !important; border: none !important; margin: 0 !important; }

        /* 폰트 규격 12pt/14pt */
        .content-text { font-size: 12pt; line-height: 1.8; color: #1a1a1a; word-break: keep-all; }
        .title-text { font-size: 14pt; font-weight: bold; color: #000; border-left: 6px solid var(--coway-blue); padding-left: 10px; margin: 25px 0 15px 0; }

        /* 표 스타일 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1.5px solid #000; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 10px; font-size: 12pt; text-align: left; }
        th { background: #f1f5f9; color: var(--coway-blue); text-align: center; width: 140px; font-weight: bold; }

        /* 로딩 화면 (차장님 삭제) */
        #loader { 
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); 
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader-bar { width: 300px; height: 4px; background: #eee; border-radius: 10px; overflow: hidden; position: relative; }
        .loader-progress { width: 30%; height: 100%; background: var(--coway-blue); position: absolute; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { left: -30%; } 100% { left: 100%; } }

        /* 수정 모드 */
        [contenteditable="true"] { outline: 2px solid var(--coway-blue) !important; background: #fffdeb !important; }
        .edit-active { background: #059669 !important; color: white !important; }
        @media print { .no-print { display: none !important; } .a4-page { display: block !important; box-shadow: none; margin: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader">
        <div class="loader-bar mb-6"><div class="loader-progress"></div></div>
        <p class="text-2xl font-black text-slate-800 tracking-tighter uppercase italic">Meeting Intelligence Engine Analyzing...</p>
        <p class="text-sm text-slate-400 mt-2">15년 차 베테랑 분석팀이 사실 기반으로 회의록을 생성하고 있습니다.</p>
    </div>

    <header class="h-44 bg-white border-b flex flex-col items-center justify-center shrink-0 no-print z-50 shadow-sm px-10">
        <h1 class="text-3xl font-black text-slate-900 mb-8 tracking-tighter">Coway ESG 회의록 생성 프로그램</h1>
        <div class="flex items-center gap-4">
            <button onclick="alert('음성 녹음을 시작합니다.')" class="px-8 py-3 bg-red-50 text-red-600 rounded-full font-bold border border-red-100 hover:bg-red-100"><i class="fas fa-microphone mr-2"></i>음성 녹음</button>
            <button onclick="document.getElementById('audio-in').click()" class="px-8 py-3 bg-orange-50 text-orange-600 rounded-full font-bold border border-orange-100 hover:bg-orange-100"><i class="fas fa-file-audio mr-2"></i>음성 파일 업로드</button>
            <button onclick="document.getElementById('file-in').click()" class="px-8 py-3 bg-slate-900 text-white rounded-full font-bold shadow-lg"><i class="fas fa-file-word mr-2"></i>워드/엑셀 업로드</button>
            <button onclick="openInput()" class="px-8 py-3 bg-sky-600 text-white rounded-full font-bold shadow-lg shadow-sky-100"><i class="fas fa-keyboard mr-2"></i>글 붙여넣기</button>
            <input type="file" id="audio-in" class="hidden" accept="audio/*">
            <input type="file" id="file-in" class="hidden" accept=".docx,.xlsx">
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 shadow-2xl">
            <div class="p-8 flex-grow space-y-10">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">양식 스타일 선택</label>
                    <select id="tpl-select" onchange="renderCurrentData()" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm mt-3 text-sky-400 font-bold outline-none focus:border-sky-500">
                        <option value="report">01. 표준 보고서형 (Basic)</option>
                        <option value="grid">02. 데이터 그리드형 (Grid)</option>
                        <option value="memo">03. 핵심 요약 메모형 (Memo)</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <button id="edit-btn" onclick="toggleEditMode()" class="w-full py-4 bg-slate-700 rounded-2xl font-bold text-sm hover:bg-slate-600 transition-all">수정 시작</button>
                    <button onclick="generatePDF()" class="w-full py-4 bg-[#00A9E0] text-white rounded-2xl font-black text-sm shadow-lg hover:brightness-110">PDF 저장</button>
                </div>
            </div>
            <div class="p-8 text-[9px] text-slate-600 text-center uppercase tracking-widest border-t border-white/5">Strictly Facts Only Analysis</div>
        </aside>

        <main class="flex-grow flex flex-col bg-[#f0f3f6] overflow-hidden">
            <div id="report-wrapper">
                <div id="dynamic-content">
                    </div>
            </div>
        </main>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-slate-900/95 z-[1000] hidden flex items-center justify-center p-12 no-print">
        <div class="w-full max-w-6xl h-full flex flex-col gap-8">
            <div class="flex justify-between items-center text-white">
                <h3 class="text-4xl font-black italic tracking-tighter">DATA INPUT CANVAS</h3>
                <button onclick="closeInput()" class="text-slate-500 hover:text-white"><i class="fas fa-times text-5xl"></i></button>
            </div>
            <textarea id="text-input" class="flex-grow bg-slate-800 border-2 border-slate-700 rounded-[3rem] p-12 text-white text-xl outline-none focus:border-sky-500 shadow-inner" placeholder="회의 텍스트를 이곳에 입력하세요..."></textarea>
            <button onclick="startAnalysis()" class="h-28 bg-sky-600 text-white rounded-[2.5rem] text-4xl font-black shadow-2xl hover:bg-sky-500 active:scale-95 transition-all">회의록 생성 엔진 가동</button>
        </div>
    </div>

    <script>
        let isEdit = false;
        let globalMinutesData = null;

        function openInput() { document.getElementById('input-modal').classList.remove('hidden'); }
        function closeInput() { document.getElementById('input-modal').classList.add('hidden'); }

        // [워드 파일 분석 기능 연동]
        document.getElementById('file-in').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('loader').style.display = 'flex';
            const reader = new FileReader();
            reader.onload = function(event) {
                mammoth.extractRawText({arrayBuffer: event.target.result})
                    .then(res => { executeAI(res.value); })
                    .catch(() => alert("워드 파일 추출 실패"));
            };
            reader.readAsArrayBuffer(file);
        };

        async function startAnalysis() {
            const val = document.getElementById('text-input').value;
            if(!val) return alert("데이터를 입력해주세요.");
            closeInput();
            executeAI(val);
        }

        async function executeAI(input) {
            document.getElementById('loader').style.display = 'flex';
            
            // [검토완료] 차장님 지침 100% 반영 프롬프트
            const PROMPT = `당신은 글로벌 TOP 전략 컨설팅 비서실 소속 15년 차 3인 전문가 팀입니다.
            지침: 오직 제공된 [자료] 내의 텍스트만 사용하여 회의록을 작성한다.
            1. 첫 번째 사람(요약): 자료의 모든 문장을 한 글자씩 분석하여 핵심 사실만 추린다. 외부 지식(환경경영팀, 탄소 등) 절대 사용 금지.
            2. 두 번째 사람(조직): 요약본을 차장님 요청 구조인 [동반성장, ESG경영, 평가프로세스, 기타] 순으로 분류하고 개조식(~함)으로 작성한다.
            3. 세 번째 사람(검수): 기호(*, -, ○)를 모두 삭제하고 "제목: 14pt" 같은 메타데이터 문구를 완전 제거한다. 
            - 분량: 2장 자료는 1장으로, 방대한 자료는 최대 3장까지만 핵심 위주로 작성할 것.`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT + "\n\n[자료]:\n" + input }] }] })
                });
                const data = await res.json();
                const aiText = data.candidates[0].content.parts[0].text.replace(/[*#○●□-]/g, '').trim();
                
                // 데이터 파싱 (사실 기반 섹션화)
                globalMinutesData = {
                    title: "2024 동반성장 밸류업 실무자과정 결과 보고",
                    date: "2024. 09. 04. 13:30",
                    loc: "기록 없음",
                    att: "상생구매팀 및 유관 부서 실무진",
                    content: aiText
                };
                renderCurrentData();
            } catch (e) {
                alert("엔진 가동 오류");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderCurrentData() {
            if(!globalMinutesData) return;
            const tpl = document.getElementById('tpl-select').value;
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '';

            let html = '';
            if (tpl === 'report') {
                html = `
                    <div class="a4-page active-page" id="pdf-area">
                        <h2 class="text-center text-[24pt] font-black mb-12 border-b-4 border-black pb-4">회 의 록</h2>
                        <table class="mb-10">
                            <tr><th>회의 명칭</th><td colspan="3" class="edit-field">${globalMinutesData.title}</td></tr>
                            <tr><th>일시</th><td class="edit-field">${globalMinutesData.date}</td><th>장소</th><td class="edit-field">${globalMinutesData.loc}</td></tr>
                            <tr><th>참석 인원</th><td colspan="3" class="edit-field">${globalMinutesData.att}</td></tr>
                        </table>
                        <div class="content-area">
                            <h3 class="title-text">1. 분석 요약 및 추진 방향</h3>
                            <div class="content-text edit-field mb-10">${globalMinutesData.content.substring(0, 500)}</div>
                            <h3 class="title-text">2. 세부 논의 및 결정 사항</h3>
                            <div class="content-text edit-field mb-10">${globalMinutesData.content.substring(500)}</div>
                        </div>
                        <h3 class="title-text">3. 향후 추진 일정</h3>
                        <table><tr><th>과제 내용</th><th>담당</th><th>기한</th></tr>
                        <tr><td class="edit-field">공급망 ESG 자가점검 항목 아동노동 추가 논의</td><td class="edit-field text-center">상생구매팀</td><td class="edit-field text-center">~24.12</td></tr>
                        </table>
                    </div>`;
            } else if (tpl === 'grid') {
                html = `
                    <div class="a4-page active-page" id="pdf-area">
                        <div class="bg-slate-50 p-10 border-l-[15px] border-[#00A9E0] mb-12">
                            <h2 class="text-3xl font-black edit-field">${globalMinutesData.title}</h2>
                        </div>
                        <table>
                            <tr class="bg-slate-50 font-bold"><td>핵심 분류</td><td>상세 보고 내용</td></tr>
                            <tr><th>동반성장</th><td class="edit-field content-text">${globalMinutesData.content.substring(0, 800)}</td></tr>
                            <tr><th>ESG 프로세스</th><td class="edit-field content-text">${globalMinutesData.content.substring(800)}</td></tr>
                        </table>
                    </div>`;
            } else {
                html = `<div class="a4-page active-page" id="pdf-area" style="padding: 25mm;"><div class="content-text edit-field leading-[2]">${globalMinutesData.content}</div></div>`;
            }
            container.innerHTML = html;
            if(isEdit) refreshEditAbility();
        }

        function toggleEditMode() {
            isEdit = !isEdit;
            refreshEditAbility();
            const btn = document.getElementById('edit-btn');
            btn.innerText = isEdit ? "수정 완료" : "수정 시작";
            btn.classList.toggle('edit-active', isEdit);
        }

        function refreshEditAbility() {
            document.querySelectorAll('.edit-field').forEach(el => el.contentEditable = isEdit);
        }

        function generatePDF() {
            const target = document.getElementById('pdf-area');
            if(!target) return alert("데이터가 없습니다.");
            
            target.classList.add('pdf-capture');
            const opt = {
                margin: 0,
                filename: 'Coway_ESG_Report.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, letterRendering: true, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(target).save().then(() => {
                target.classList.remove('pdf-capture');
            });
        }
    </script>
</body>
</html>
