<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coway ESG 지능형 협업 마스터 V24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f3f6; margin: 0; }
        :root { --coway-blue: #00A9E0; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; padding: 15mm; box-shadow: none; border: none; }
        .content-text { font-size: 12pt; line-height: 1.8; color: #1a1a1a; text-align: justify; }
        .title-text { font-size: 14pt; font-weight: bold; color: #000; border-left: 6px solid var(--coway-blue); padding-left: 10px; margin: 25px 0 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 10px; font-size: 12pt; }
        th { background: #f8fafc; color: var(--coway-blue); text-align: center; width: 140px; font-weight: bold; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .edit-active { outline: 3px solid var(--coway-blue) !important; background: #fffdeb !important; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <div id="loader">
        <p class="text-2xl font-black text-slate-800 animate-pulse">고도의 정밀 분석을 수행 중입니다...</p>
    </div>

    <header class="h-44 bg-white border-b flex flex-col items-center justify-center shrink-0 no-print shadow-sm px-10">
        <h1 class="text-3xl font-black text-slate-900 mb-8">Coway ESG 회의록 생성 프로그램</h1>
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('file-in').click()" class="px-8 py-3 bg-slate-900 text-white rounded-full font-bold shadow-lg"><i class="fas fa-file-word mr-2"></i>파일 업로드 분석</button>
            <input type="file" id="file-in" class="hidden" accept=".docx,.xlsx">
            <button onclick="openCanvas()" class="px-8 py-3 bg-sky-600 text-white rounded-full font-bold shadow-lg"><i class="fas fa-keyboard mr-2"></i>글 붙여넣기</button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <aside class="w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 p-8 space-y-10">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">양식 스타일</label>
                <select id="tpl-select" onchange="renderData()" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm mt-3 text-sky-400 font-bold outline-none">
                    <option value="report">01. 표준 보고서형</option>
                    <option value="grid">02. 데이터 그리드형</option>
                </select>
            </div>
            <button id="edit-btn" onclick="toggleEditMode()" class="w-full py-4 bg-slate-700 rounded-2xl font-bold text-sm">수정 시작</button>
            <button onclick="savePDF()" class="w-full py-4 bg-[#00A9E0] text-white rounded-2xl font-black text-sm">PDF 저장</button>
        </aside>

        <main class="flex-grow overflow-y-auto p-12 bg-[#f0f3f6]">
            <div id="dynamic-content"></div>
        </main>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-slate-900/95 z-[1000] hidden flex items-center justify-center p-12 no-print">
        <div class="w-full max-w-6xl h-full flex flex-col gap-8 text-white">
            <h3 class="text-4xl font-black">DATA INPUT CANVAS</h3>
            <textarea id="text-input" class="flex-grow bg-slate-800 border-2 border-slate-700 rounded-[3rem] p-12 text-white text-xl outline-none focus:border-sky-500" placeholder="내용을 입력하세요..."></textarea>
            <button onclick="startAnalysis()" class="h-28 bg-sky-600 rounded-[2.5rem] text-4xl font-black">분석 가동</button>
        </div>
    </div>

    <script>
        let isEdit = false; let minutesData = null;
        function openCanvas() { document.getElementById('input-modal').classList.remove('hidden'); }
        function closeCanvas() { document.getElementById('input-modal').classList.add('hidden'); }

        document.getElementById('file-in').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                mammoth.extractRawText({arrayBuffer: event.target.result}).then(res => executeAI(res.value));
            };
            reader.readAsArrayBuffer(file);
        };

        async function startAnalysis() {
            const val = document.getElementById('text-input').value;
            if(!val) return;
            closeCanvas(); executeAI(val);
        }

        async function executeAI(input) {
            document.getElementById('loader').style.display = 'flex';
            // 고품질 성공 사례의 프롬프트 이식
            const PROMPT = `당신은 글로벌 TOP 비서실 소속 15년 차 전문가 3인 팀입니다.
            지침: [자료] 내의 텍스트만 100% 사용하여 회의록을 작성한다. 창작 금지.
            1. 요약가: 핵심 사실만 추린다. (예: 상생구매팀, 파트너사 평가 강화 등)
            2. 조직가: 차장님 요청 구조 [핵심요약, 세부내용(동반성장/ESG경영/평가프로세스/기타), 향후일정] 순으로 배치.
            3. 검수자: 특수기호 삭제 및 완벽한 한글 개조식 작성.
            - 가독성 극대화, 제목 14pt/본문 12pt 스타일 준수.`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT + "\n\n[자료]:\n" + input }] }] })
                });
                const data = await res.json();
                const aiText = data.candidates[0].content.parts[0].text.replace(/[*#○●□-]/g, '').trim();
                
                minutesData = { title: "2024 동반성장 밸류업 실무자과정 결과 보고", date: "2024. 09. 04. 13:30", att: "상생구매팀 및 관련 실무자", body: aiText };
                renderData();
            } catch (e) { alert("오류 발생"); } finally { document.getElementById('loader').style.display = 'none'; }
        }

        function renderData() {
            if(!minutesData) return;
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `
                <div class="a4-page active-page" id="pdf-area">
                    <h2 class="text-center text-[24pt] font-black mb-12 border-b-4 border-black pb-4">회 의 록</h2>
                    <table>
                        <tr><th>회의 명칭</th><td colspan="3" class="edit-field">${minutesData.title}</td></tr>
                        <tr><th>일시</th><td class="edit-field">${minutesData.date}</td><th>장소</th><td class="edit-field">기록 없음</td></tr>
                        <tr><th>참석 인원</th><td colspan="3" class="edit-field">${minutesData.att}</td></tr>
                    </table>
                    <div class="content-text edit-field">${minutesData.body.replace(/\n/g, '<br>')}</div>
                </div>`;
            if(isEdit) refreshEdit();
        }

        function toggleEditMode() {
            isEdit = !isEdit; refreshEdit();
            document.getElementById('edit-btn').innerText = isEdit ? "수정 완료" : "수정 시작";
        }
        function refreshEdit() { document.querySelectorAll('.edit-field').forEach(el => el.contentEditable = isEdit); }
        function savePDF() { 
            const opt = { margin: 0, filename: 'Report.pdf', image: { type: 'jpeg', quality: 1.0 }, html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(document.getElementById('pdf-area')).save();
        }
    </script>
</body>
</html>
